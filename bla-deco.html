<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bla — Art déco (Chauffer)</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Archivo",sans-serif;color:#fff;background:#0c0712;padding:26px 16px 70px;}
  h1{font-family:"Bricolage Grotesque";font-weight:800;font-size:26px;letter-spacing:-.02em;margin-bottom:4px;}
  .sub{color:rgba(255,255,255,.62);font-size:14px;margin-bottom:22px;max-width:62ch;line-height:1.5;}
  .grid{display:flex;flex-wrap:wrap;gap:14px;}
  .item{width:128px;}
  .card{width:128px;aspect-ratio:5/7;border-radius:18px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.5);position:relative;}
  .pip{position:absolute;top:9px;right:10px;width:14px;height:14px;border-radius:50%;border:2px solid rgba(244,217,166,.55);}
  .lbl{font-size:11.5px;color:rgba(255,255,255,.62);margin-top:7px;text-align:center;}
  @media(max-width:520px){.item,.card{width:42vw;}}
</style>
</head>
<body>
  <h1>🥵 Chauffer — Art déco / précieux</h1>
  <p class="sub">Ornement vectoriel, trait doré fin sur pourpre &amp; sanguin. Damas baroque, asanoha, cubes isométriques, lotus ciselé, ogives, chevrons. Deux fonds par motif. Dis-moi lesquels tu gardes et l'épaisseur du trait.</p>
  <div id="board" class="grid"></div>

<script>
  function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function sv(inner){return "url(\"data:image/svg+xml,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='120' height='168' viewBox='0 0 120 168'>"+inner+"</svg>")+"\") center/cover no-repeat";}
  function rect(c){return "<rect width='120' height='168' fill='"+c+"'/>";}

  /* 1 — Damas baroque (volutes + feuilles) */
  function damask(g,bg,seed){const r=mulberry(seed);let b=rect(bg);
    const leaf=(L,rot)=>"<path transform='rotate("+rot+")' d='M0 0 C"+(L*0.5)+" "+(-L*0.45)+" "+(L*0.38)+" "+(-L)+" 0 "+(-L)+" C"+(-L*0.38)+" "+(-L)+" "+(-L*0.5)+" "+(-L*0.45)+" 0 0 Z' fill='"+g+"' fill-opacity='0.9'/>";
    const curl=(rot)=>"<path transform='rotate("+rot+")' d='M0 0 C7 -1 9 -8 3 -10 C-1 -11 -2 -6 1 -6' fill='none' stroke='"+g+"' stroke-opacity='0.85' stroke-width='1.4'/>";
    let s="";
    for(let i=0;i<24;i++){const cx=(r()*134-7).toFixed(1),cy=(r()*182-7).toFixed(1),rot=(r()*360).toFixed(0),sc=(0.55+r()*0.7).toFixed(2);
      s+="<g transform='translate("+cx+" "+cy+") rotate("+rot+") scale("+sc+")'>"+curl(0)+leaf(10,-35)+leaf(10,0)+leaf(10,35)+"<circle r='1.8' fill='"+g+"'/></g>";}
    return sv(b+s);}

  /* 2 — Asanoha (feuille de chanvre) */
  function asanoha(g,bg){let b=rect(bg);const s=24,h=s*Math.sqrt(3)/2,d=s/Math.sqrt(3);
    let e="<g fill='none' stroke='"+g+"' stroke-opacity='0.85' stroke-width='1'>";
    for(let r=-1;r*h<168+h;r++){const y=r*h;for(let c=-1;c*s<120+s;c++){const x=c*s+((r&1)?s/2:0);
      [0,60,120].forEach(ang=>{const a=ang*Math.PI/180;e+="<line x1='"+x.toFixed(1)+"' y1='"+y.toFixed(1)+"' x2='"+(x+Math.cos(a)*s).toFixed(1)+"' y2='"+(y+Math.sin(a)*s).toFixed(1)+"'/>";});
      for(let k=0;k<6;k++){const a=(30+k*60)*Math.PI/180;e+="<line x1='"+x.toFixed(1)+"' y1='"+y.toFixed(1)+"' x2='"+(x+Math.cos(a)*d).toFixed(1)+"' y2='"+(y+Math.sin(a)*d).toFixed(1)+"'/>";}
    }}
    return sv(b+e+"</g>");}

  /* 3 — Cubes isométriques (faces hachurées) */
  function cubes(g,bg){let b=rect(bg);const R=15,dx=R*1.732,dy=R*1.5;
    const P=a=>a[0].toFixed(1)+" "+a[1].toFixed(1);
    function hatch(A,B,C,D,n){let o='';for(let i=1;i<n;i++){const t=i/n;const px=A[0]+(B[0]-A[0])*t,py=A[1]+(B[1]-A[1])*t,qx=D[0]+(C[0]-D[0])*t,qy=D[1]+(C[1]-D[1])*t;o+="<line x1='"+px.toFixed(1)+"' y1='"+py.toFixed(1)+"' x2='"+qx.toFixed(1)+"' y2='"+qy.toFixed(1)+"'/>";}return o;}
    let s="<g fill='none' stroke='"+g+"' stroke-opacity='0.8' stroke-width='0.85'>";
    for(let row=-1;row*dy<168+dy;row++){const cy=row*dy;for(let col=-1;col*dx<120+dx;col++){const cx=col*dx+((row&1)?dx/2:0);
      const top=[cx,cy-R],ur=[cx+R*0.866,cy-R*0.5],lr=[cx+R*0.866,cy+R*0.5],bot=[cx,cy+R],ll=[cx-R*0.866,cy+R*0.5],ul=[cx-R*0.866,cy-R*0.5],ce=[cx,cy];
      s+="<path d='M"+P(top)+" L"+P(ur)+" L"+P(ce)+" L"+P(ul)+" Z'/><path d='M"+P(ur)+" L"+P(lr)+" L"+P(bot)+" L"+P(ce)+" Z'/><path d='M"+P(ul)+" L"+P(ce)+" L"+P(bot)+" L"+P(ll)+" Z'/>";
      s+=hatch(top,ur,ce,ul,4)+hatch(ur,lr,bot,ce,4)+hatch(ul,ce,bot,ll,4);
    }}
    return sv(b+s+"</g>");}

  /* 4 — Lotus ciselé (ogives concentriques) */
  function lotus(g,bg){let b=rect(bg);const cw=26,ch=40;
    const path=(cx,cy,rx,ry)=>"<path d='M"+cx+" "+(cy-ry).toFixed(1)+" C"+(cx+rx)+" "+(cy-ry*0.3).toFixed(1)+" "+(cx+rx)+" "+(cy+ry*0.3).toFixed(1)+" "+cx+" "+(cy+ry).toFixed(1)+" C"+(cx-rx)+" "+(cy+ry*0.3).toFixed(1)+" "+(cx-rx)+" "+(cy-ry*0.3).toFixed(1)+" "+cx+" "+(cy-ry).toFixed(1)+" Z'/>";
    let s="<g fill='none' stroke='"+g+"' stroke-opacity='0.8' stroke-width='0.8'>";
    for(let col=-1;col*cw<120+cw;col++){for(let row=-1;row*ch<168+ch;row++){const cx=col*cw+((row&1)?cw/2:0)+cw/2;const cy=row*ch+ch/2;
      for(let k=1;k<=8;k++){const f=k/8;s+=path(cx,cy,cw*0.5*f,ch*0.52*f);}}}
    return sv(b+s+"</g>");}

  /* 5 — Ogives concentriques (op-art) */
  function ogee(g,bg){let b=rect(bg);const cs=26;let ry=0;
    let s="<g fill='none' stroke='"+g+"' stroke-opacity='0.82' stroke-width='0.9'>";
    for(let y=-cs;y<168+cs;y+=cs){const off=(ry%2)*(cs/2);for(let x=-cs;x<120+cs;x+=cs){[12,8.5,5,2.2].forEach(rr=>{s+="<circle cx='"+(x+off)+"' cy='"+y+"' r='"+rr+"'/>";});}ry++;}
    return sv(b+s+"</g>");}

  /* 6 — Chevrons */
  function chevron(g,bg){let b=rect(bg);const w=11,h=10;
    let s="<g fill='none' stroke='"+g+"' stroke-opacity='0.85' stroke-width='2.1'>";
    for(let cx=-w;cx<120+w;cx+=w){for(let y=-h;y<168+h;y+=h){s+="<path d='M"+cx+" "+(y+h)+" L"+(cx+w/2)+" "+y+" L"+(cx+w)+" "+(y+h)+"'/>";}}
    return sv(b+s+"</g>");}

  const PATS=[["Damas",damask],["Asanoha",asanoha],["Cubes",cubes],["Lotus",lotus],["Ogives",ogee],["Chevrons",chevron]];
  const WAYS=[
    {g:"#e8c07a", bg:"#3a0c2a"},   /* or / aubergine */
    {g:"#f0d49a", bg:"#5a0a26"}    /* champagne / sanguin */
  ];
  const board=document.getElementById('board');
  PATS.forEach((p,pi)=>{WAYS.forEach((w,wi)=>{
    const it=document.createElement('div');it.className='item';
    it.innerHTML="<div class='card'><span class='pip'></span></div><div class='lbl'>"+p[0]+"</div>";
    board.appendChild(it);
    it.querySelector('.card').style.background=p[1](w.g,w.bg,pi*89+wi*31+7);
  });});
</script>
</body>
</html>
