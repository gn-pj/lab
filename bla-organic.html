<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bla — organique (Séduire)</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Archivo",sans-serif;color:#fff;background:#0c0a16;padding:26px 16px 70px;}
  h1{font-family:"Bricolage Grotesque";font-weight:800;font-size:26px;letter-spacing:-.02em;margin-bottom:4px;}
  .sub{color:rgba(255,255,255,.62);font-size:14px;margin-bottom:22px;max-width:62ch;line-height:1.5;}
  .grid{display:flex;flex-wrap:wrap;gap:14px;}
  .item{width:128px;}
  .card{width:128px;aspect-ratio:5/7;border-radius:18px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.45);position:relative;}
  canvas{width:100%;height:100%;display:block;}
  .pip{position:absolute;top:9px;right:10px;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.5);}
  .lbl{font-size:11.5px;color:rgba(255,255,255,.62);margin-top:7px;text-align:center;}
  @media(max-width:520px){.item,.card{width:42vw;}}
</style>
</head>
<body>
  <h1>🥰 Séduire — organique</h1>
  <p class="sub">Vrais motifs génératifs (bruit de Perlin, contours, Voronoï). Chaque motif en deux gammes romantiques. Dis-moi lesquels tu gardes, l'épaisseur du trait et les teintes — ensuite je les intègre au jeu.</p>
  <div id="board" class="grid"></div>

<script>
  function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function hexRGB(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  /* Perlin noise */
  function makeNoise(seed){
    const perm=[];for(let i=0;i<256;i++)perm[i]=i;
    const rnd=mulberry(seed);
    for(let i=255;i>0;i--){const j=Math.floor(rnd()*(i+1));const t=perm[i];perm[i]=perm[j];perm[j]=t;}
    const p=new Uint8Array(512);for(let i=0;i<512;i++)p[i]=perm[i&255];
    const fade=t=>t*t*t*(t*(t*6-15)+10), lerp=(a,b,t)=>a+(b-a)*t;
    function grad(h,x,y){switch(h&3){case 0:return x+y;case 1:return -x+y;case 2:return x-y;default:return -x-y;}}
    return function(x,y){
      const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);
      const u=fade(x),v=fade(y);
      const aa=p[p[X]+Y],ab=p[p[X]+Y+1],ba=p[p[X+1]+Y],bb=p[p[X+1]+Y+1];
      return lerp(lerp(grad(aa,x,y),grad(ba,x-1,y),u),lerp(grad(ab,x,y-1),grad(bb,x-1,y-1),u),v);
    };
  }
  function fbm(n,x,y,oct){let v=0,a=0.5,f=1,m=0;for(let i=0;i<oct;i++){v+=a*n(x*f,y*f);m+=a;f*=2;a*=0.5;}return v/m;}

  /* 1 — Turing : lignes-contours du bruit (vermicelles) */
  function turing(ctx,W,H,colA,colB,seed){const n=makeNoise(seed);const A=hexRGB(colA),B=hexRGB(colB);const img=ctx.createImageData(W,H);const s=0.055,band=0.10;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){const v=fbm(n,x*s,y*s,4);const on=Math.abs(v)<band;const c=on?B:A;const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}
    ctx.putImageData(img,0,0);}

  /* 2 — Coulée : deux régions organiques (warp large) */
  function coulee(ctx,W,H,colA,colB,seed){const n=makeNoise(seed);const A=hexRGB(colA),B=hexRGB(colB);const img=ctx.createImageData(W,H);const s=0.022;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){const q=fbm(n,x*s,y*s,2);const v=fbm(n,x*s+q*1.4+3.1,y*s+q*1.4,3);const c=v>0?B:A;const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}
    ctx.putImageData(img,0,0);}

  /* 3 — Cellules : Voronoï (parois entre cellules) */
  function cellules(ctx,W,H,cellCol,wallCol,seed){const rnd=mulberry(seed);const CC=hexRGB(cellCol),WC=hexRGB(wallCol);
    const cols=6,rows=8,pts=[];for(let gy=0;gy<rows;gy++)for(let gx=0;gx<cols;gx++)pts.push([(gx+0.15+rnd()*0.7)*W/cols,(gy+0.15+rnd()*0.7)*H/rows]);
    const img=ctx.createImageData(W,H);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d1=1e9,d2=1e9;for(let k=0;k<pts.length;k++){const dx=x-pts[k][0],dy=y-pts[k][1];const d=dx*dx+dy*dy;if(d<d1){d2=d1;d1=d;}else if(d<d2)d2=d;}
      const edge=(Math.sqrt(d2)-Math.sqrt(d1))<3.0;const c=edge?WC:CC;const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}
    ctx.putImageData(img,0,0);}

  /* 4 — Veines : lignes fluides directionnelles */
  function veines(ctx,W,H,bg,line,seed){const n=makeNoise(seed);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);const A=hexRGB(bg),B=hexRGB(line);const img=ctx.getImageData(0,0,W,H);const s=0.03;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){const ph=x*0.10 + fbm(n,x*s,y*s,3)*7.0;const f=ph-Math.floor(ph);const on=f<0.16;if(on){const i=(y*W+x)*4;img.data[i]=B[0];img.data[i+1]=B[1];img.data[i+2]=B[2];img.data[i+3]=255;}}
    ctx.putImageData(img,0,0);}

  /* 5 — Botanique : feuilles façon Matisse */
  function botanique(ctx,W,H,bg,leaf,seed){const rnd=mulberry(seed);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle=leaf;
    function lf(cx,cy,len,rot){ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(len*0.42,-len*0.42,0,-len);ctx.quadraticCurveTo(-len*0.42,-len*0.42,0,0);ctx.fill();ctx.restore();}
    function sprig(cx,cy,rot){ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.strokeStyle=leaf;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(6,-18,2,-34);ctx.stroke();for(let k=1;k<=4;k++){lf(Math.sin(k)*3,-k*8,9,(k%2?1:-1)*0.9);}ctx.restore();}
    const N=11;for(let i=0;i<N;i++){const cx=rnd()*W,cy=rnd()*H,rot=rnd()*Math.PI*2;if(rnd()<0.5)lf(cx,cy,16+rnd()*16,rot);else sprig(cx,cy,rot);}
    ctx.restore();}

  const PATS=[["Turing",turing],["Coulée",coulee],["Cellules",cellules],["Veines",veines],["Botanique",botanique]];
  const WAYS=[
    {a:"#fff3ec", b:"#ff6f91"},   /* crème / rose */
    {a:"#36122e", b:"#ff9ebb"}    /* prune / blush */
  ];
  const board=document.getElementById('board');
  PATS.forEach((p,pi)=>{
    WAYS.forEach((w,wi)=>{
      const it=document.createElement('div');it.className='item';
      it.innerHTML="<div class='card'><canvas></canvas><span class='pip'></span></div><div class='lbl'>"+p[0]+"</div>";
      board.appendChild(it);
      const cv=it.querySelector('canvas');const W=128,H=179;cv.width=W;cv.height=H;
      const ctx=cv.getContext('2d');
      p[1](ctx,W,H,w.a,w.b,pi*97+wi*43+11);
    });
  });
</script>
</body>
</html>
