<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bla — organique (Séduire)</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Archivo",sans-serif;color:#fff;background:#140a16;padding:26px 16px 70px;}
  h1{font-family:"Bricolage Grotesque";font-weight:800;font-size:26px;letter-spacing:-.02em;margin-bottom:4px;}
  .sub{color:rgba(255,255,255,.62);font-size:14px;margin-bottom:22px;max-width:62ch;line-height:1.5;}
  .grid{display:flex;flex-wrap:wrap;gap:14px;}
  .item{width:128px;}
  .card{width:128px;aspect-ratio:5/7;border-radius:18px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.45);position:relative;}
  canvas{width:100%;height:100%;display:block;}
  .pip{position:absolute;top:9px;right:10px;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.5);}
  .lbl{font-size:11.5px;color:rgba(255,255,255,.62);margin-top:7px;text-align:center;}
  @media(max-width:520px){.item,.card{width:42vw;}}
</style>
</head>
<body>
  <h1>🥰 Séduire — organique · v2</h1>
  <p class="sub">Couleurs de l'app (prune / rose / lilas) — tu ne juges que les formes. Dix motifs génératifs, chacun en deux teintes. Dis-moi lesquels tu gardes.</p>
  <div id="board" class="grid"></div>

<script>
  function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function hexRGB(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function makeNoise(seed){
    const perm=[];for(let i=0;i<256;i++)perm[i]=i;const rnd=mulberry(seed);
    for(let i=255;i>0;i--){const j=Math.floor(rnd()*(i+1));const t=perm[i];perm[i]=perm[j];perm[j]=t;}
    const p=new Uint8Array(512);for(let i=0;i<512;i++)p[i]=perm[i&255];
    const fade=t=>t*t*t*(t*(t*6-15)+10),lerp=(a,b,t)=>a+(b-a)*t;
    function grad(h,x,y){switch(h&3){case 0:return x+y;case 1:return -x+y;case 2:return x-y;default:return -x-y;}}
    return function(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fade(x),v=fade(y);
      const aa=p[p[X]+Y],ab=p[p[X]+Y+1],ba=p[p[X+1]+Y],bb=p[p[X+1]+Y+1];
      return lerp(lerp(grad(aa,x,y),grad(ba,x-1,y),u),lerp(grad(ab,x,y-1),grad(bb,x-1,y-1),u),v);};
  }
  function fbm(n,x,y,oct){let v=0,a=0.5,m=0,f=1;for(let i=0;i<oct;i++){v+=a*n(x*f,y*f);m+=a;f*=2;a*=0.5;}return v/m;}

  function fieldDraw(ctx,W,H,colA,colB,seed,decide){const n=makeNoise(seed);const A=hexRGB(colA),B=hexRGB(colB);const img=ctx.createImageData(W,H);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=decide(x,y,n)?B:A;const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}ctx.putImageData(img,0,0);}

  /* fields */
  const turing  =(c,W,H,a,b,s)=>fieldDraw(c,W,H,a,b,s,(x,y,n)=>Math.abs(fbm(n,x*0.055,y*0.055,4))<0.10);
  const worms   =(c,W,H,a,b,s)=>fieldDraw(c,W,H,a,b,s,(x,y,n)=>Math.abs(fbm(n,x*0.05,y*0.05,4))<0.185);
  const coulee  =(c,W,H,a,b,s)=>fieldDraw(c,W,H,a,b,s,(x,y,n)=>{const q=fbm(n,x*0.022,y*0.022,2);return fbm(n,x*0.022+q*1.4+3.1,y*0.022+q*1.4,3)>0;});
  const anneaux =(c,W,H,a,b,s)=>fieldDraw(c,W,H,a,b,s,(x,y,n)=>{const t=((fbm(n,x*0.03,y*0.03,3)+1)*0.5)*5;return (Math.floor(t)%2)===0;});
  const contours=(c,W,H,a,b,s)=>fieldDraw(c,W,H,a,b,s,(x,y,n)=>{const t=((fbm(n,x*0.03,y*0.03,3)+1)*0.5)*7;return (t-Math.floor(t))<0.13;});
  const veines  =(c,W,H,a,b,s)=>fieldDraw(c,W,H,a,b,s,(x,y,n)=>{const ph=x*0.10+fbm(n,x*0.03,y*0.03,3)*7;return (ph-Math.floor(ph))<0.16;});

  /* pointillé : vermicelles fins + points dans les vides */
  function pointille(ctx,W,H,a,b,seed){const n=makeNoise(seed);const A=hexRGB(a),B=hexRGB(b);const img=ctx.createImageData(W,H);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=Math.abs(fbm(n,x*0.058,y*0.058,4))<0.058?B:A;const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}
    ctx.putImageData(img,0,0);ctx.fillStyle=b;
    for(let y=4;y<H;y+=7)for(let x=4;x<W;x+=7){if(fbm(n,x*0.058,y*0.058,4)>0.28){ctx.beginPath();ctx.arc(x,y,1.5,0,7);ctx.fill();}}}

  /* Voronoï */
  function seeds(W,H,seed){const rnd=mulberry(seed);const cols=6,rows=8,pts=[];for(let gy=0;gy<rows;gy++)for(let gx=0;gx<cols;gx++)pts.push([(gx+0.15+rnd()*0.7)*W/cols,(gy+0.15+rnd()*0.7)*H/rows]);return pts;}
  function cellules(ctx,W,H,cell,wall,seed){const pts=seeds(W,H,seed);const CC=hexRGB(cell),WC=hexRGB(wall);const img=ctx.createImageData(W,H);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d1=1e9,d2=1e9;for(let k=0;k<pts.length;k++){const dx=x-pts[k][0],dy=y-pts[k][1];const d=dx*dx+dy*dy;if(d<d1){d2=d1;d1=d;}else if(d<d2)d2=d;}
      const c=(Math.sqrt(d2)-Math.sqrt(d1))<3.0?WC:CC;const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}ctx.putImageData(img,0,0);}
  function mosaique(ctx,W,H,wall,motif,seed){const pts=seeds(W,H,seed);const rnd=mulberry(seed*7+1);const WC=hexRGB(wall),M=hexRGB(motif);
    const tones=pts.map(()=>{const f=0.12+rnd()*0.55;return [Math.round(M[0]+(255-M[0])*f),Math.round(M[1]+(255-M[1])*f),Math.round(M[2]+(255-M[2])*f)];});
    const img=ctx.createImageData(W,H);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d1=1e9,d2=1e9,id=0;for(let k=0;k<pts.length;k++){const dx=x-pts[k][0],dy=y-pts[k][1];const d=dx*dx+dy*dy;if(d<d1){d2=d1;d1=d;id=k;}else if(d<d2)d2=d;}
      const c=(Math.sqrt(d2)-Math.sqrt(d1))<2.4?WC:tones[id];const i=(y*W+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;}ctx.putImageData(img,0,0);}

  /* botanique Matisse */
  function botanique(ctx,W,H,bg,leaf,seed){const rnd=mulberry(seed);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle=leaf;ctx.strokeStyle=leaf;
    function lf(cx,cy,len,rot){ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(len*0.42,-len*0.42,0,-len);ctx.quadraticCurveTo(-len*0.42,-len*0.42,0,0);ctx.fill();ctx.restore();}
    function sprig(cx,cy,rot){ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(6,-18,2,-34);ctx.stroke();for(let k=1;k<=4;k++)lf(Math.sin(k)*3,-k*8,9,(k%2?1:-1)*0.9);ctx.restore();}
    for(let i=0;i<12;i++){const cx=rnd()*W,cy=rnd()*H,rot=rnd()*6.28;if(rnd()<0.5)lf(cx,cy,16+rnd()*16,rot);else sprig(cx,cy,rot);}}

  const PATS=[["Turing",turing],["Vermicelles",worms],["Pointillé",pointille],["Anneaux",anneaux],["Contours",contours],["Coulée",coulee],["Cellules",cellules],["Mosaïque",mosaique],["Veines",veines],["Botanique",botanique]];
  const WAYS=[
    {a:"#4a1734", b:"#ff7aa2"},   /* rose sur prune */
    {a:"#280f24", b:"#c084fc"}    /* lilas sur prune foncé */
  ];
  const board=document.getElementById('board');
  PATS.forEach((p,pi)=>{WAYS.forEach((w,wi)=>{
    const it=document.createElement('div');it.className='item';
    it.innerHTML="<div class='card'><canvas></canvas><span class='pip'></span></div><div class='lbl'>"+p[0]+"</div>";
    board.appendChild(it);
    const cv=it.querySelector('canvas');cv.width=128;cv.height=179;
    p[1](cv.getContext('2d'),128,179,w.a,w.b,pi*97+wi*43+11);
  });});
</script>
</body>
</html>
