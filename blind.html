<style>
  :root{
    --bg1:#1b1a3a; --bg2:#322a6e; --bg3:#1e9bd1;
    --ink:#1d2230; --muted:#9aa0ad;
    --s1a:#ff8a4c; --s1b:#ff4d6d;
    --s2a:#36b7f5; --s2b:#5a6bff;
    --s3a:#b162ff; --s3b:#ff5fb0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  @property --bg1{ syntax:'<color>'; inherits:true; initial-value:#1a1d4a; }
  @property --bg2{ syntax:'<color>'; inherits:true; initial-value:#101b3c; }
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:"Archivo",sans-serif;color:#fff;
    background:
      radial-gradient(60% 50% at 18% 12%, rgba(255,95,176,.30) 0%, transparent 55%),
      radial-gradient(60% 50% at 86% 84%, rgba(54,183,245,.32) 0%, transparent 55%),
      linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 52%, #163a63 100%);
    transition:--bg1 .55s ease, --bg2 .55s ease;
    user-select:none;
  }
  #app{height:100dvh;display:flex;flex-direction:column;position:relative;}

  /* floating background blobs */
  .blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.45;z-index:0;transition:background .55s ease;}
  .blob.a{width:42vmax;height:42vmax;left:-12vmax;top:-10vmax;background:#ff5fb0;animation:drift1 18s ease-in-out infinite;}
  .blob.b{width:38vmax;height:38vmax;right:-12vmax;bottom:-12vmax;background:#36b7f5;animation:drift2 22s ease-in-out infinite;}
  /* tapis de jeu : une couleur de fond par mode */
  body.m-connaitre{--bg1:#1a1d4a;--bg2:#101b3c;}
  body.m-connaitre .blob.a{background:#5a6bff;} body.m-connaitre .blob.b{background:#36b7f5;}
  body.m-seduire{--bg1:#4a1734;--bg2:#280f24;}
  body.m-seduire .blob.a{background:#ff7aa2;} body.m-seduire .blob.b{background:#c084fc;}
  body.m-chauffer{--bg1:#3a0c1c;--bg2:#190509;}
  body.m-chauffer .blob.a{background:#ff2e63;} body.m-chauffer .blob.b{background:#ff5c3c;}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(4vmax,3vmax)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-4vmax,-3vmax)}}

  .screen{display:none;flex:1;flex-direction:column;position:relative;z-index:2;min-height:0;}
  .screen.active{display:flex;animation:fade .5s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  .brand{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;letter-spacing:-.02em;}
  .deck-emoji{font-weight:400;font-size:.9em;letter-spacing:0;vertical-align:middle;}

  /* ---------- SETUP ---------- */
  #setup{align-items:center;justify-content:safe center;padding:24px;overflow-y:auto;}
  #setup .brand{font-size:46px;margin-bottom:4px;}
  .sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:56px;}
  .modes{display:flex;gap:4px;background:rgba(255,255,255,.1);border-radius:999px;padding:4px;margin:0 auto 26px;width:100%;max-width:360px;}
  .modes .mode{flex:1;text-align:center;border:none;background:transparent;color:rgba(255,255,255,.72);font-family:inherit;font-weight:600;font-size:13.5px;padding:9px 6px;border-radius:999px;cursor:pointer;transition:.2s;}
  .modes .mode.on{background:#fff;color:#1c1a15;}
  .groupnote{display:none;color:rgba(255,255,255,.82);font-size:15px;max-width:30ch;margin:2px auto 6px;text-align:center;line-height:1.5;}
  .rows{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:10px;align-items:stretch;touch-action:none;}
  .name{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
    border-radius:16px;padding:13px 16px;color:#fff;font-family:"Archivo";font-size:16px;font-weight:500;outline:none;transition:.2s;}
  .name::placeholder{color:rgba(255,255,255,.45);}
  .name:focus{border-color:#fff;background:rgba(255,255,255,.16);}
  .gw{display:flex;background:rgba(255,255,255,.08);border-radius:14px;padding:3px;flex:0 0 120px;width:120px;}
  .g{flex:1 1 0;display:flex;align-items:center;justify-content:center;text-align:center;border:none;background:transparent;color:rgba(255,255,255,.7);font-family:"Archivo";font-weight:600;
    font-size:13px;padding:9px 0;border-radius:11px;cursor:pointer;transition:.2s;}
  .g.on[data-g="f"]{background:linear-gradient(135deg,#ff5fb0,#ff4d6d);color:#fff;}
  .g.on[data-g="m"]{background:linear-gradient(135deg,#36b7f5,#5a6bff);color:#fff;}
  .rm{flex:0 0 auto;align-self:center;width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.08);
    color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;transition:.2s;line-height:1;}
  .rm:hover{background:rgba(255,80,110,.32);color:#fff;}
  .row.dragging{opacity:.4;}
  .row.drop{background:rgba(255,255,255,.10);border-radius:16px;}
  .row.drop .name{box-shadow:0 0 0 2px #fff;border-color:transparent;}
  .row.linked .name{box-shadow:0 0 0 2px var(--cc,#8b5cf6);border-color:transparent;}
  .lghost{position:fixed;z-index:9999;pointer-events:none;padding:13px 16px;border-radius:16px;background:#fff;color:#1b1a3a;font-family:"Bricolage Grotesque";font-weight:800;font-size:15px;box-shadow:0 14px 36px rgba(0,0,0,.45);transform:translate(-50%,-50%);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  body.linking #setup{overflow:hidden;}
  .linkhint{font-size:11.5px;color:rgba(255,255,255,.55);text-align:center;margin-top:9px;line-height:1.6;}
  .linkhint .cpl{white-space:nowrap;}
  .linkhint .dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px;}
  .linkhint .sep{opacity:.5;}
  .ver{position:fixed;right:8px;bottom:6px;z-index:50;font-size:10px;letter-spacing:.04em;color:rgba(255,255,255,.35);pointer-events:none;}
  .addp{margin-top:14px;background:transparent;border:1px dashed rgba(255,255,255,.3);color:rgba(255,255,255,.82);
    font-family:"Archivo";font-weight:600;font-size:14px;border-radius:12px;padding:9px 18px;cursor:pointer;transition:.2s;}
  .addp:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.08);}
  .cta{margin-top:30px;border:none;cursor:pointer;font-family:"Bricolage Grotesque";font-weight:700;font-size:17px;
    color:#1b1a3a;background:#fff;padding:16px 46px;border-radius:40px;transition:.2s;
    box-shadow:0 12px 34px rgba(0,0,0,.28);}
  .cta:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.34);}
  .cta-row{display:flex;align-items:center;gap:12px;margin-top:38px;}
  .cta-row .cta{margin-top:0;flex:1;}
  .cta-row .addp{margin-top:0;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0;border-radius:50%;width:56px;height:56px;flex:0 0 56px;}

  /* ---------- GAME ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;z-index:6;}
  .topbar .brand{font-size:24px;color:#fff;}
  .kebab{position:relative;}
  .kebab>button{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.12);
    color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
  .kebab>button:hover{background:rgba(255,255,255,.22);}
  .menu{position:absolute;right:0;top:48px;background:#fff;color:var(--ink);border-radius:16px;
    box-shadow:0 18px 40px rgba(0,0,0,.3);overflow:hidden;min-width:190px;display:none;z-index:20;}
  .menu.open{display:block;animation:fade .2s ease;}
  .menu button{display:block;width:100%;text-align:left;border:none;background:none;font-family:"Archivo";
    font-size:14px;font-weight:500;padding:14px 18px;cursor:pointer;color:var(--ink);transition:.15s;}
  .menu button:hover{background:#f3f4f8;}
  .menu button+button{border-top:1px solid #eef0f4;}

  .deck-area{flex:1;position:relative;min-height:0;overflow:hidden;touch-action:none;cursor:grab;}
  .deck-area:active{cursor:grabbing;}
  .deck{position:absolute;inset:0;perspective:1200px;animation:sway 10s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-1.1deg)}50%{transform:rotate(1.1deg)}}
  .deck.frozen{animation-play-state:paused;}
  .deck.frozen .floater{animation-play-state:paused;}
  .deck.presenting .card:not(.out){opacity:.18;filter:saturate(.85);}

  .card{position:absolute;left:50%;top:50%;
    width:clamp(200px,57vw,242px);aspect-ratio:5/7;cursor:pointer;
    transition:transform .68s cubic-bezier(.2,.8,.22,1), opacity .45s ease;}
  /* pulled out toward the viewer uses a springier curve (transform set inline) */
  .card.out{transition-timing-function:cubic-bezier(.34,1.3,.5,1);}
  .floater{position:absolute;inset:0;perspective:1000px;animation:float 5.6s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .flip{position:absolute;inset:0;}

  .face{position:absolute;inset:0;border-radius:22px;overflow:hidden;
    box-shadow:0 6px 15px rgba(0,0,0,.16);transition:box-shadow .35s ease;}
  .card.out .face{box-shadow:0 30px 64px rgba(0,0,0,.46);}
  .deck.piling .face{box-shadow:none;}   /* cards stacked at one point → no shadow, never goes dark */
  .deck.shuffling .face{box-shadow:0 26px 54px rgba(0,0,0,.45);}   /* relief marqué pendant le mélange */
  .back{display:flex;align-items:flex-end;padding:18px;background:#fff;}
  .bkart{position:absolute;inset:7px;border-radius:16px;overflow:hidden;z-index:0;}
  .back .bk{position:relative;z-index:2;font-family:"Bricolage Grotesque";font-weight:800;font-size:18.9px;color:rgba(255,255,255,.95);letter-spacing:-.01em;max-width:calc(100% - 12px);line-height:1.02;overflow-wrap:anywhere;}
  .back .pip{position:absolute;top:16px;right:18px;z-index:2;width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.55);}

  .front{opacity:0;transition:opacity .12s ease;background:#fff;display:flex;flex-direction:column;}
  .card.flipped .front{opacity:1;}
  .fhead{padding:16px 18px 15px;color:#fff;display:flex;flex-direction:column;gap:3px;}
  .fserie{font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;opacity:.92;}
  .fname{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(22px,6.4vw,30px);line-height:1;}
  .fbody{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 18px;overflow:auto;}
  .fbody::-webkit-scrollbar{width:0;}
  .fq{font-family:"Bricolage Grotesque";font-weight:500;color:var(--ink);text-align:center;
    font-size:clamp(15px,4vw,19px);line-height:1.42;text-wrap:balance;}
  .fq .w{display:inline-block;}
  @keyframes wordIn{to{opacity:1;transform:none;}}
  .ffoot{padding:11px;font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--muted);
    text-align:center;border-top:1px solid #eef0f4;}
  .ftimer{display:none;align-items:center;gap:10px;margin:0 16px 6px;padding:7px 10px;border-radius:14px;background:#f3f4f7;}
  .ftimer .tbtn{flex:none;width:30px;height:30px;border-radius:50%;border:none;background:var(--ink);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .ftimer.run .tbtn{background:#e11d48;}
  .ftimer.done .tbtn{background:#16a34a;}
  .ftimer .ttime{font-family:"Bricolage Grotesque";font-weight:800;font-size:16px;color:var(--ink);min-width:42px;text-align:center;font-variant-numeric:tabular-nums;}
  .ftimer.done .ttime{color:#16a34a;}
  .ftimer .tbar{flex:1;height:5px;border-radius:3px;background:#e3e6eb;overflow:hidden;}
  .ftimer .tbar i{display:block;height:100%;width:0;background:var(--ink);transition:width .9s linear;}
  .ftimer.run .tbar i{background:#e11d48;}
  .ftimer.done .tbar i{background:#16a34a;}

  /* bottom bar */
  .bottom{padding:18px 20px calc(20px + env(safe-area-inset-bottom));z-index:6;
    display:flex;flex-direction:column;align-items:center;gap:14px;min-height:96px;justify-content:center;}
  .top-actions{display:flex;gap:10px;}
  .icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.12);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
  .icon-btn:hover{background:rgba(255,255,255,.22);}
  .icon-btn:active{transform:scale(.94);}
  .icon-btn svg{width:19px;height:19px;}
  .prompt{font-size:14px;font-weight:500;letter-spacing:.04em;color:rgba(255,255,255,.85);
    animation:pulse 2.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .actions{display:none;gap:10px;flex-wrap:wrap;justify-content:center;}
  .actions.show{display:flex;animation:fade .4s ease;}
  .btn{border:none;cursor:pointer;font-family:"Bricolage Grotesque";font-weight:700;font-size:14px;
    padding:13px 20px;border-radius:38px;transition:.2s;white-space:nowrap;}
  .btn.fill{color:#1b1a3a;background:#fff;box-shadow:0 10px 26px rgba(0,0,0,.3);}
  .btn.fill:hover{transform:translateY(-2px);}
  .btn.ghost{color:#fff;background:rgba(255,255,255,.12);}
  .btn.ghost:hover{background:rgba(255,255,255,.2);}
  .hint{height:18px;margin-top:0;font-size:13px;font-weight:500;color:#ffd1de;opacity:0;transition:opacity .3s;}
  .hint.show{opacity:1;}
  .reset-x{position:absolute;top:16px;right:18px;width:38px;height:38px;border-radius:50%;border:none;
    background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;transition:.2s;
    display:flex;align-items:center;justify-content:center;}
  .reset-x:hover{background:rgba(255,255,255,.22);transform:rotate(90deg);}

  /* ----- Blind : masquer le setup joueurs, fond dédié, lecteur audio ----- */
  #modes,#rows,.linkhint,#addp,#reset,#editPlayers{display:none!important;}
  body.m-blind{--bg1:#241043;--bg2:#141033;}
  body.m-blind .blob.a{background:#a855f7;} body.m-blind .blob.b{background:#3b82f6;}
  .fbody{flex-direction:column;}
  .fbody .play{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:34px;
    background:linear-gradient(135deg,#7c3aed,#2563eb);box-shadow:0 12px 26px rgba(124,58,237,.42);
    display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .fbody .play:active{transform:scale(.93);}
  .fbody .sbar{width:74%;height:7px;border-radius:4px;background:#e9e9f1;overflow:hidden;margin-top:18px;}
  .fbody .sbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#2563eb);border-radius:4px;}
  .fbody .shint{margin-top:12px;font-size:13px;color:#8b8a98;font-weight:500;font-family:"Archivo";}
  .fbody .sart{width:140px;height:140px;border-radius:14px;object-fit:cover;box-shadow:0 10px 24px rgba(0,0,0,.2);background:#eee;}
  .fbody .sans{margin-top:14px;text-align:center;}
  .fbody .sa{font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;color:#15131f;line-height:1.06;}
  .fbody .st{font-size:16px;font-weight:600;color:#3a3850;margin-top:2px;}
  .fbody .sy{display:inline-block;margin-top:8px;font-family:"Bricolage Grotesque";font-weight:800;font-size:13px;color:#fff;background:#15131f;border-radius:999px;padding:3px 11px;}
</style>
</head>
<body>
<div class="ver">Blind v1</div>
<div class="blob a"></div><div class="blob b"></div>
<div id="app">

  <!-- SETUP -->
  <section id="setup" class="screen active">
    <button id="reset" class="reset-x" title="Oublier les prénoms" aria-label="Réinitialiser les prénoms">✕</button>
    <div class="brand">Blind</div>
    <div class="sub">Blind test des années 90. Devine la chanson.</div>
    <div class="modes" id="modes">
      <button type="button" class="mode on" data-deck="connaitre">🤓 Connaître</button>
      <button type="button" class="mode" data-deck="seduire">🥰 Séduire</button>
      <button type="button" class="mode" data-deck="chauffer">🥵 Chauffer</button>
    </div>
    <div id="rows" class="rows"></div>
    <div class="linkhint"></div>
    <div id="hint" class="hint"></div>
    <div class="cta-row">
      <button id="addp" class="addp" type="button" aria-label="Ajouter un joueur">+1</button>
      <button id="start" class="cta">Jouer</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="game" class="screen">
    <div class="topbar">
      <div class="brand">Blind <span id="deckEmoji" class="deck-emoji"></span></div>
      <div class="top-actions">
        <button id="shuffle" class="icon-btn" aria-label="Mélanger" title="Mélanger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
        </button>
        <button id="editPlayers" class="icon-btn" aria-label="Joueurs" title="Joueurs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.6"/><path d="M17.5 14c2.3.4 4 2.3 4 5"/></svg>
        </button>
      </div>
    </div>

    <div class="deck-area">
      <div id="deck" class="deck"></div>
    </div>

    <div class="bottom">
      <div id="prompt" class="prompt">Touche une carte</div>
      <div id="actions" class="actions">
        <button id="reveal" class="btn ghost">Révéler</button>
        <button id="next" class="btn fill">Suivant&nbsp;!</button>
      </div>
    </div>
  </section>
</div>

  const DECKS={ blind:{ emoji:"🎧", name:"Blind", intro:"Blind test des années 90.", sets:{

        {"id": 716691562, "a": "Vanilla Ice", "t": "Ice Ice Baby", "y": "1990"},
        {"id": 1517447333, "a": "Oasis", "t": "Wonderwall", "y": "1995"},

        {"id": 192822739, "a": "Ricky Martin", "t": "Livin' la Vida Loca", "y": "1999"}
      ],
    2:[
        {"id": 270246724, "a": "TLC", "t": "Waterfalls", "y": "1994"},
        {"id": 1031419968, "a": "Alanis Morissette", "t": "Ironic", "y": "1995"},
        {"id": 1440945283, "a": "R.E.M.", "t": "Losing My Religion", "y": "1991"},

function aZebra(W,H,rng){let b="",x=-10;while(x<W+10){const w=11+rng()*20,amp=4+rng()*9,k=(1.3+rng()*1.9)*Math.PI/H,ph=rng()*6.28,sk=(rng()-0.5)*0.55,N=20;let d="";for(let i=0;i<=N;i++){const y=i/N*H,xe=x+Math.sin(y*k+ph)*amp+y*sk;d+=(i?"L":"M")+F1(xe)+" "+F1(y);}for(let i=N;i>=0;i--){const y=i/N*H,wob=1+0.5*Math.sin(y*k*1.7+ph),xe=x+w*wob*0.6+Math.sin(y*k+ph+0.8)*amp+y*sk;d+="L"+F1(xe)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='white' fill-opacity='"+WO+"'/>";x+=w*0.6+9+rng()*16;}return b;}

function aLeopard(W,H,rng){let b="";const sx=W/4,sy=H/5.4;for(let gy=-1;gy<6;gy++)for(let gx=-1;gx<5;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.7,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.7,rr=7+rng()*5,seg=4+Math.floor(rng()*3),rot=rng()*6.28;let g="<g fill='none' stroke='white' stroke-opacity='"+WO+"' stroke-width='3.2' stroke-linecap='round'>";for(let s=0;s<seg;s++){const a0=rot+s/seg*6.28+0.3,a1=a0+6.28/seg-0.85,x0=cx+Math.cos(a0)*rr,y0=cy+Math.sin(a0)*rr,x1=cx+Math.cos(a1)*rr,y1=cy+Math.sin(a1)*rr;g+="<path d='M"+F1(x0)+" "+F1(y0)+" A "+F1(rr)+" "+F1(rr)+" 0 0 1 "+F1(x1)+" "+F1(y1)+"'/>";}g+="</g>";b+=g;}return b;}
function aCow(W,H,rng){let b="";const n=4+Math.floor(rng()*2);for(let i=0;i<n;i++){const cx=rng()*W,cy=rng()*H,base=26+rng()*34,M=20;let d="";for(let j=0;j<=M;j++){const a=j/M*6.283,rr=base*(0.62+0.5*Math.sin(a*2+i*1.3)+0.32*(rng()-0.5));const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*1.1;d+=(j?"L":"M")+F1(x)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='white' fill-opacity='"+WO+"'/>";}return b;}
function aSnake(W,H,rng){let b="";const cw=18,ch=13;let ry=0;for(let y=-ch;y<H+ch;y+=ch){const off=(ry%2)*(cw/2);for(let x=-cw;x<W+cw;x+=cw){const X=x+off;b+="<path d='M"+F1(X)+" "+F1(y-ch*0.6)+" L"+F1(X+cw*0.5)+" "+F1(y)+" L"+F1(X)+" "+F1(y+ch*0.6)+" L"+F1(X-cw*0.5)+" "+F1(y)+" Z' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.6'/>";}ry++;}return b;}
function aDots(W,H,rng){let b="";const n=60;for(let i=0;i<n;i++){const cx=rng()*W,cy=rng()*H,base=2.5+rng()*5,M=10;let d="";for(let j=0;j<=M;j++){const a=j/M*6.283,rr=base*(0.7+0.5*(rng()-0.5));const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;d+=(j?"L":"M")+F1(x)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='white' fill-opacity='"+WO+"'/>";}return b;}
/* ===== Séduire : famille « cœur » (remplace les peaux d'animaux) — BLANC sur couleur ===== */
var HEART=s=>"<path d='M0 "+F1(-s*0.3)+" C "+F1(-s*0.5)+" "+F1(-s*0.85)+" "+F1(-s)+" "+F1(-s*0.1)+" 0 "+F1(s*0.6)+" C "+F1(s)+" "+F1(-s*0.1)+" "+F1(s*0.5)+" "+F1(-s*0.85)+" 0 "+F1(-s*0.3)+" Z'/>";
function sSemis(W,H,rng){let b=_scatter(W,H,rng,3,4,0.55,{sz:r=>6+r()*5,draw:HEART});
  for(let i=0;i<26;i++){b+="<circle cx='"+F1(rng()*W)+"' cy='"+F1(rng()*H)+"' r='"+F1(1.3+rng()*1.4)+"' fill='white' fill-opacity='"+WO+"'/>";}return b;}
/* dense multi-tailles (réf. champ de cœurs) */
function sDense(W,H,rng){return _scatter(W,H,rng,4,5,0.62,{sz:r=>5+r()*9,draw:HEART});}
/* doodle : cœurs en contour + petites volutes (réf. cœurs + spirales) */
function sDoodle(W,H,rng){let b="";const sx=W/3,sy=H/4;
  for(let gy=-1;gy<5;gy++)for(let gx=-1;gx<4;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.6,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.6;
    if(rng()<0.62){const s=7+rng()*5,rot=(rng()-0.5)*40;
      b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.7' stroke-linejoin='round'>"+HEART(s)+"</g>";}
    else{const r=4+rng()*4,turns=1.3+rng()*0.9,dir=rng()<0.5?1:-1,N=34;let d="";for(let i=0;i<=N;i++){const t=i/N,a=dir*t*turns*6.2832,rr=r*t;d+=(i?"L":"M")+F1(cx+Math.cos(a)*rr)+" "+F1(cy+Math.sin(a)*rr);}
      b+="<path d='"+d+"' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.6' stroke-linecap='round'/>";}}return b;}
/* groovy : cœurs pleins, dodus, qui s'enchaînent (réf. liquide rétro) */
function sGroovy(W,H,rng){let b="";const sx=W/2.4,sy=H/3.2;let ry=0;
  for(let y=-sy*0.5;y<H+sy;y+=sy){const off=(ry%2)*(sx*0.5);
    for(let x=-sx*0.5;x<W+sx;x+=sx){const cx=x+off+(rng()-0.5)*10,cy=y+(rng()-0.5)*10,s=18+rng()*10,rot=(rng()-0.5)*50;
      const d="M0 "+F1(-s*0.32)+" C "+F1(-s*0.62)+" "+F1(-s*0.96)+" "+F1(-s*1.06)+" "+F1(-s*0.05)+" 0 "+F1(s*0.72)+" C "+F1(s*1.06)+" "+F1(-s*0.05)+" "+F1(s*0.62)+" "+F1(-s*0.96)+" 0 "+F1(-s*0.32)+" Z";
      b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='white' fill-opacity='"+WO+"'><path d='"+d+"'/></g>";}ry++;}return b;}
/* mosaïque : champ plein de cœurs serrés (réf. champs pleins — désormais viable en filigrane) */
function sMosaic(W,H,rng){let b="";const cs=26;let ry=0;for(let y=-cs;y<H+cs;y+=cs*0.92){const off=(ry%2)*(cs*0.5);for(let x=-cs;x<W+cs;x+=cs){const cx=x+off+(rng()-0.5)*4,cy=y+(rng()-0.5)*4,s=cs*(0.5+rng()*0.16),rot=(rng()-0.5)*30;b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='white' fill-opacity='"+WO+"'>"+HEART(s)+"</g>";}ry++;}return b;}
/* tapis de cœurs multi-tailles (réf. champ dense) */
function sConfetti(W,H,rng){return _scatter(W,H,rng,5,6,0.6,{sz:r=>3.5+r()*9,draw:HEART});}
/* tunnel de cœurs concentriques (réf. Y2K) */
function sTunnel(W,H,rng){const cx=W*0.5,cy=H*0.5,rings=7,maxR=Math.max(W,H)*0.9,HU="M0 -0.175 C -0.5 -0.725 -1 0.025 0 0.725 C 1 0.025 0.5 -0.725 0 -0.175 Z";let b="";for(let i=rings;i>=1;i--){const k=(i/rings)*maxR;if(i===1)b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") scale("+F1(k)+") translate(0 -0.18)'><path d='"+HU+"' fill='white' fill-opacity='0.5'/></g>";else b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") scale("+F1(k)+") translate(0 -0.18)'><path d='"+HU+"' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='4' vector-effect='non-scaling-stroke'/></g>";}return b;}
/* lignes de cœurs (serrées en X, espacées en Y) */
function sRows(W,H,rng){let b="";const px=W/6,py=H/5;for(let y=py*0.5;y<H+py;y+=py){for(let x=px*0.5;x<W+px;x+=px){const s=px*0.42;b+="<g transform='translate("+F1(x)+" "+F1(y)+")' fill='white' fill-opacity='"+WO+"'>"+HEART(s)+"</g>";}}return b;}
/* colonnes de cœurs (serrées en Y, espacées en X) */
function sCols(W,H,rng){let b="";const px=W/4,py=H/8;for(let x=px*0.5;x<W+px;x+=px){for(let y=py*0.5;y<H+py;y+=py){const s=py*0.42;b+="<g transform='translate("+F1(x)+" "+F1(y)+")' fill='white' fill-opacity='"+WO+"'>"+HEART(s)+"</g>";}}return b;}
var SKINS=[sSemis,sDense,sDoodle,sGroovy,sMosaic,sConfetti,sTunnel,sRows,sCols];
function skinMotif(seed){const r=oRng(seed*5+2);const f=SKINS[Math.floor(r()*SKINS.length)];return svURL(200,280,f(200,280,r));}

/* ============ CHAUFFER — mélange playful, BLANC sur transparent ============ */
function cFlames(W,H,rng){let b="";const C=5,Rw=7;for(let gy=0;gy<Rw;gy++)for(let gx=-1;gx<=C;gx++){const sc=0.5+gy/Rw*0.9,cx=gx*W/C+W/C*0.5+(rng()-0.5)*W/C*0.6,cy=gy*H/Rw+H/Rw*0.7+(rng()-0.5)*12,h=(16+rng()*15)*sc,w=h*0.42,tip=cx+(rng()-0.5)*w*0.9;b+="<path d='M"+F1(cx)+" "+F1(cy)+" C "+F1(cx-w)+" "+F1(cy-h*0.45)+" "+F1(tip-w*0.25)+" "+F1(cy-h*0.82)+" "+F1(tip)+" "+F1(cy-h)+" C "+F1(tip+w*0.25)+" "+F1(cy-h*0.82)+" "+F1(cx+w)+" "+F1(cy-h*0.45)+" "+F1(cx)+" "+F1(cy)+" Z' fill='white' fill-opacity='"+WO+"'/>";}return b;}
function cWaves(W,H,rng){let b="";const step=15+rng()*8,amp=7+rng()*7,f=(1.4+rng()*1.6)*Math.PI/W,ph=rng()*6.28;let idx=0;for(let base=-step;base<H+step*2;base+=step*2){const N=24;let d="M-4 "+F1(base);for(let i=0;i<=N;i++){const x=i/N*W,y=base+Math.sin(x*f+ph)*amp;d+="L"+F1(x)+" "+F1(y);}for(let i=N;i>=0;i--){const x=i/N*W,y=base+step+Math.sin(x*f+ph+step*0.05)*amp;d+="L"+F1(x)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='white' fill-opacity='"+WO+"'/>";idx++;}return b;}
function cKiss(W,H,rng){let b="";const sx=W/3.4,sy=H/4.6;for(let gy=-1;gy<5;gy++)for(let gx=-1;gx<4;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.6,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.6,s=7+rng()*7,rot=(rng()-0.5)*44;const up="M "+F1(-s)+" "+F1(-s*0.05)+" C "+F1(-s*0.7)+" "+F1(-s*0.55)+" "+F1(-s*0.4)+" "+F1(-s*0.55)+" 0 "+F1(-s*0.2)+" C "+F1(s*0.4)+" "+F1(-s*0.55)+" "+F1(s*0.7)+" "+F1(-s*0.55)+" "+F1(s)+" "+F1(-s*0.05)+" L "+F1(s*0.7)+" "+F1(s*0.02)+" C "+F1(s*0.4)+" "+F1(-s*0.18)+" "+F1(s*0.2)+" "+F1(-s*0.05)+" 0 "+F1(s*0.05)+" C "+F1(-s*0.2)+" "+F1(-s*0.05)+" "+F1(-s*0.4)+" "+F1(-s*0.18)+" "+F1(-s*0.7)+" "+F1(s*0.02)+" Z";const lo="M "+F1(-s*0.7)+" "+F1(s*0.08)+" C "+F1(-s*0.3)+" "+F1(s*0.62)+" "+F1(s*0.3)+" "+F1(s*0.62)+" "+F1(s*0.7)+" "+F1(s*0.08)+" C "+F1(s*0.3)+" "+F1(s*0.26)+" "+F1(-s*0.3)+" "+F1(s*0.26)+" "+F1(-s*0.7)+" "+F1(s*0.08)+" Z";b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='white' fill-opacity='"+WO+"'><path d='"+up+"'/><path d='"+lo+"'/></g>";}return b;}
function cSparks(W,H,rng){let b="";const sx=W/4,sy=H/5.2;for(let gy=-1;gy<6;gy++)for(let gx=-1;gx<5;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.7,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.7,rr=4+rng()*7,N=rng()<0.5?4:6,rot=rng()*6.28;let g="<g stroke='white' stroke-opacity='"+WS+"' stroke-width='1.6' stroke-linecap='round'>";for(let s=0;s<N;s++){const a=rot+s/N*6.2832;g+="<line x1='"+F1(cx-Math.cos(a)*rr)+"' y1='"+F1(cy-Math.sin(a)*rr)+"' x2='"+F1(cx+Math.cos(a)*rr)+"' y2='"+F1(cy+Math.sin(a)*rr)+"'/>";}g+="</g><circle cx='"+F1(cx)+"' cy='"+F1(cy)+"' r='1.7' fill='white' fill-opacity='"+WO+"'/>";b+=g;}return b;}
function _scatter(W,H,rng,nx,ny,jit,fn){let b="";const sx=W/nx,sy=H/ny;for(let gy=-1;gy<=ny;gy++)for(let gx=-1;gx<=nx;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*jit,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*jit,rot=(rng()-0.5)*60,s=fn.sz(rng);b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='white' fill-opacity='"+WO+"'>"+fn.draw(s)+"</g>";}return b;}
function cHearts(W,H,rng){return _scatter(W,H,rng,4,5,0.6,{sz:r=>6+r()*6,draw:s=>"<path d='M0 "+F1(-s*0.3)+" C "+F1(-s*0.5)+" "+F1(-s*0.85)+" "+F1(-s)+" "+F1(-s*0.1)+" 0 "+F1(s*0.6)+" C "+F1(s)+" "+F1(-s*0.1)+" "+F1(s*0.5)+" "+F1(-s*0.85)+" 0 "+F1(-s*0.3)+" Z'/>"});}
function cDrops(W,H,rng){return _scatter(W,H,rng,4,6,0.6,{sz:r=>5+r()*6,draw:s=>"<path d='M0 "+F1(-s)+" C "+F1(s*0.62)+" "+F1(-s*0.2)+" "+F1(s*0.55)+" "+F1(s*0.7)+" 0 "+F1(s)+" C "+F1(-s*0.55)+" "+F1(s*0.7)+" "+F1(-s*0.62)+" "+F1(-s*0.2)+" 0 "+F1(-s)+" Z'/>"});}
function cChili(W,H,rng){return _scatter(W,H,rng,4,5,0.6,{sz:r=>7+r()*6,draw:s=>"<path d='M"+F1(-s*0.15)+" "+F1(-s)+" C "+F1(s*0.55)+" "+F1(-s*0.75)+" "+F1(s*0.5)+" "+F1(s*0.55)+" 0 "+F1(s)+" C "+F1(-s*0.4)+" "+F1(s*0.6)+" "+F1(-s*0.55)+" "+F1(-s*0.35)+" "+F1(-s*0.15)+" "+F1(-s)+" Z'/><path d='M"+F1(-s*0.15)+" "+F1(-s)+" q "+F1(s*0.4)+" "+F1(-s*0.3)+" "+F1(s*0.1)+" "+F1(-s*0.5)+"' stroke='white' stroke-opacity='"+WO+"' stroke-width='2' fill='none'/>"});}
function cBolts(W,H,rng){return _scatter(W,H,rng,4,5,0.6,{sz:r=>8+r()*7,draw:s=>"<path d='M"+F1(-s*0.1)+" "+F1(-s)+" L "+F1(s*0.45)+" "+F1(-s*0.1)+" L "+F1(s*0.08)+" "+F1(-s*0.1)+" L "+F1(s*0.4)+" "+F1(s)+" L "+F1(-s*0.2)+" "+F1(s*0.05)+" L "+F1(s*0.12)+" "+F1(s*0.05)+" Z'/>"});}
function cSwirls(W,H,rng){let b="";const sx=W/3.6,sy=H/4.8;for(let gy=-1;gy<5;gy++)for(let gx=-1;gx<4;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.6,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.6,turns=1.6+rng()*1.2,rmax=8+rng()*7,dir=rng()<0.5?1:-1,N=40;let d="";for(let i=0;i<=N;i++){const t=i/N,ang=dir*t*turns*6.2832,r=rmax*t;const x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;d+=(i?"L":"M")+F1(x)+" "+F1(y);}b+="<path d='"+d+"' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.7' stroke-linecap='round'/>";}return b;}
/* ===== Chauffer : bouche en vedette + cerises + menottes ===== */
function cCherries(W,H,rng){return _scatter(W,H,rng,4,5,0.6,{sz:r=>7+r()*5,draw:s=>"<circle cx='"+F1(-s*0.4)+"' cy='"+F1(s*0.5)+"' r='"+F1(s*0.42)+"'/><circle cx='"+F1(s*0.45)+"' cy='"+F1(s*0.52)+"' r='"+F1(s*0.4)+"'/><path d='M"+F1(-s*0.4)+" "+F1(s*0.05)+" C "+F1(-s*0.1)+" "+F1(-s*0.6)+" "+F1(s*0.2)+" "+F1(-s*0.7)+" "+F1(s*0.12)+" "+F1(-s)+"' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.6'/><path d='M"+F1(s*0.45)+" "+F1(s*0.1)+" C "+F1(s*0.2)+" "+F1(-s*0.55)+" "+F1(s*0.04)+" "+F1(-s*0.75)+" "+F1(s*0.12)+" "+F1(-s)+"' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.6'/>"});}
function cCuffs(W,H,rng){let b="";const sx=W/3.2,sy=H/4.6;for(let gy=-1;gy<5;gy++)for(let gx=-1;gx<4;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.6,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.6,r=4.5+rng()*2.5,rot=(rng()-0.5)*60,gap=r*1.9;b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='1.8'><circle cx='"+F1(-gap)+"' cy='0' r='"+F1(r)+"'/><circle cx='"+F1(gap)+"' cy='0' r='"+F1(r)+"'/><line x1='"+F1(-gap+r)+"' y1='"+F1(-r*0.25)+"' x2='"+F1(gap-r)+"' y2='"+F1(-r*0.25)+"'/><line x1='"+F1(-gap+r)+"' y1='"+F1(r*0.25)+"' x2='"+F1(gap-r)+"' y2='"+F1(r*0.25)+"'/></g>";}return b;}

var ST=w=>"fill='none' stroke='white' stroke-opacity='"+WS+"' stroke-width='"+w+"' stroke-linecap='round' stroke-linejoin='round'";
var PLUMP=s=>"<path d='M0 "+F1(-s*0.32)+" C "+F1(-s*0.64)+" "+F1(-s*0.98)+" "+F1(-s*1.08)+" "+F1(-s*0.04)+" 0 "+F1(s*0.74)+" C "+F1(s*1.08)+" "+F1(-s*0.04)+" "+F1(s*0.64)+" "+F1(-s*0.98)+" 0 "+F1(-s*0.32)+" Z'/>";
function cTessel(W,H,rng){let b="";const cs=24;let ry=0;for(let y=-cs;y<H+cs;y+=cs*0.82){const off=(ry%2)*(cs*0.5);for(let x=-cs;x<W+cs;x+=cs){const cx=x+off,cy=y,rot=((ry+Math.round(x/cs))%2)*180+(rng()-0.5)*8,s=cs*0.6;b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")' fill='white' fill-opacity='"+WO+"'>"+PLUMP(s)+"</g>";}ry++;}return b;}

function cOpart(W,H,rng){const cx=W/2,cy=H/2,maxR=Math.max(W,H)*0.62,N=140;let b="",idx=0;for(let base=12;base<maxR;base+=15){const A=base*0.14,f=8,ph=idx*0.7;let d="";for(let i=0;i<=N;i++){const a=i/N*6.2832,r=base+A*Math.sin(f*a+ph),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;d+=(i?"L":"M")+F1(x)+" "+F1(y);}b+="<path d='"+d+" Z' "+ST(2.2)+"/>";idx++;}return b;}

  /* monogramme : maille régulière, icônes du thème mêlées et légèrement pivotées (graine → stable par carte) */
  function monogram(names, seed){
    let s=(seed>>>0)||1; const rnd=()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; };
    const dense = rnd()<0.5;                         /* alterne 2×2 / 3×3 pour varier */
    const C = dense?40:48, n = dense?3:2, T=C*n, sc=(dense?0.30:0.36);
    const order=names.slice();
    for(let i=order.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
    let body='',k=0;
    for(let gy=0;gy<n;gy++)for(let gx=0;gx<n;gx++){
      const cx=gx*C+C/2, cy=gy*C+C/2, rot=Math.round((rnd()-.5)*36);
      body+="<g transform='translate("+cx+" "+cy+") rotate("+rot+") scale("+sc.toFixed(3)+") translate(-50 -50)'>"+ICONS[order[k%order.length]]+"</g>"; k++;
    }
    const svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+T+"' height='"+T+"' viewBox='0 0 "+T+" "+T+"' fill='white' fill-opacity='0.28'>"+body+"</svg>";

    return 'url("data:image/svg+xml,'+encodeURIComponent(svg)+'") 0 0/'+px+'px '+px+'px';
  }

  function detect(raw){

  function spacingFor(v){ return v<=1 ? 0 : Math.min(26, 360/(v-1)); }

  /* l'éventail = toutes les cartes encore vivantes, dans leur ordre figé */
  function fanList(){ return cards.filter(c=>!c._dead); }
  function computeVis(){
    let n=fanList().length;
    if(n===0){ cards.forEach(c=>c._dead=false); n=cards.length; }   /* tout supprimé → on remet le deck complet */
    vis=Math.max(1, n);                                             /* on montre TOUTES les cartes vivantes (navigation au doigt) */
  }

  /* finite fan: cards on a fixed sine, centred; pan slides them (no loop, real start/end) */
  function poseOf(i){
    const sp=spacingFor(vis);
    const x=(i-(vis-1)/2)*sp + pan, phase=x*KFIX;
    return { t:'translate(-50%,-50%) translate('+x.toFixed(2)+'vw,'+(AMP*Math.sin(phase)).toFixed(1)+'px) rotate('+(TILT*Math.cos(phase)).toFixed(2)+'deg)', z:i };
  }
  function layout(){ const f=fanList(); for(let k=0;k<f.length;k++){ const el=f[k]; if(el===curEl) continue; const p=poseOf(k); el.style.transform=p.t; el.style.zIndex=p.z; } }

  /* place chaque carte vivante à sa position ; cache les cartes supprimées */
  function applyVis(){
    computeVis(); clampPan();
    cards.forEach(el=>{ if(el._dead){ el.style.pointerEvents='none'; el.style.opacity='0'; el.style.transform='translate(-50%,-50%) translateY(20px) scale(.6)'; } });
    fanList().forEach((el,k)=>{ el.style.pointerEvents=''; const p=poseOf(k); el.style.transform=p.t; el.style.zIndex=p.z; el.style.opacity=''; });
  }

  /* each player keeps their own shuffled pile → never the same question twice (until all 36 seen) */
  function shuf(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }
  /* eased start: 2 questions from série 1, then 3 from série 2, then a true shuffle of the rest */
  function buildPile(){
    const all=ALL.map((_,i)=>i);
    const ofS=s=>all.filter(i=>ALL[i].serie===s);
    const head=shuf(ofS(1)).slice(0,2).concat(shuf(ofS(2)).slice(0,3));
    const used=new Set(head);
    return head.concat(shuf(all.filter(i=>!used.has(i))));
  }
  /* pose le deck UNE SEULE FOIS : chaque carte reçoit sa question + son motif (couleur + trame) définitifs */
  /* pool de motifs réutilisé → le navigateur ne rastérise qu'une poignée d'images au lieu de 36 (perf changement de joueur) */
  var _motifPool={};
  function motifPool(key){ if(_motifPool[key]) return _motifPool[key]; const bank=key==='seduire'?SKINS:CHAUF; const arr=bank.map((f,i)=>svURL(200,280,f(200,280,oRng(i*131+7)))); _motifPool[key]=arr; return arr; }
  /* suite equilibree d'indices : chaque entree ~meme nombre de fois, melangee, sans repetition adjacente */
  function balancedSeq(poolLen,count){ if(poolLen<=1) return new Array(count).fill(0); const seq=[]; for(let i=0;i<count;i++) seq.push(i%poolLen); for(let i=seq.length-1;i>0;i--){const j=rand(i+1);const tmp=seq[i];seq[i]=seq[j];seq[j]=tmp;} for(let i=1;i<seq.length;i++){ if(seq[i]===seq[i-1]){ for(let k=i+1;k<seq.length;k++){ if(seq[k]!==seq[i]&&seq[k]!==seq[i-1]){ const tmp=seq[i];seq[i]=seq[k];seq[k]=tmp; break; } } } } return seq; }
  function dealDeck(){
    buildALL(); buildQueues();
    const order=buildPile();
    let motifs, PAL;
    if(deckKey==='seduire'||deckKey==='chauffer'){ motifs=motifPool(deckKey); PAL=deckKey==='seduire'?SEDU_PAL:CHAUF_PAL; }
    else { motifs=PAT_URLS; PAL=PALETTE; }
    const mSeq=balancedSeq(motifs.length, cards.length), cSeq=balancedSeq(PAL.length, cards.length);
    cards.forEach((el,i)=>{
      el._qid=order[i]; el._dead=false; el._chosenIdx=null;
      const bg=motifs[mSeq[i]]+', '+PAL[cSeq[i]];
      el.dataset.bg=bg; const art=el.querySelector('.bkart'); if(art) art.style.background=bg;
    });
    dealt=true;
  }

  /* the deck "belongs" to whoever's turn it is → their name on every back */
  function setBacks(){ const nm = groupMode ? 'Blind' : (players[curPlayer]?players[curPlayer].name:''); cards.forEach(el=>{ const b=el.querySelector('.bk'); if(b) b.textContent=nm; }); }

  function startGame(){
    if(!built) buildDeck();
    if(!groupMode && players.length>1){            /* on tire l'ordre du tour de table au sort, une seule fois */
      for(let i=players.length-1;i>0;i--){ const j=rand(i+1); [players[i],players[j]]=[players[j],players[i]]; }
    }
    curPlayer=0;                                    /* puis chacun son tour, dans cet ordre */
    { const e=$('deckEmoji'); if(e) e.textContent=DECKS[deckKey]?DECKS[deckKey].emoji:''; }   /* emoji du thème à côté de « Bla » */
    dealDeck();                                  /* deck figé pour toute la partie : motif + question par carte */
    pan=0; cancelInertia(); curEl=null; curQid=null;
    cards.forEach(el=>el.classList.remove('out','flipped'));
    deck.classList.remove('frozen','presenting');
    $('actions').classList.remove('show');
    computeVis(); deploy();
  }

  /* the living cards fan out from a closed stack */
  function deploy(){
    animating=true; setBacks();
    const f=fanList(), d=Math.min(0.04, 0.8/Math.max(vis,1));
    cards.forEach(el=>{ el.style.transition='none'; el.style.transform='translate(-50%,-50%) translateY(20px) scale(.72)'; el.style.opacity='0'; });
    void deck.offsetWidth;
    f.forEach((el,k)=>{
      el.style.transition='transform .55s cubic-bezier(.2,.85,.25,1) '+(k*d).toFixed(3)+'s, opacity .38s ease '+(k*d).toFixed(3)+'s';
      const p=poseOf(k); el.style.transform=p.t; el.style.zIndex=p.z; el.style.opacity=''; el.style.pointerEvents='';
    });
    cards.forEach(el=>{ if(el._dead) el.style.pointerEvents='none'; });
    showPrompt();
    setTimeout(()=>{ cards.forEach(el=>{el.style.transition='';}); animating=false; }, 700+vis*d*1000);
  }

  function showPrompt(){
    $('prompt').textContent = groupMode ? 'Touche une carte' : ('Au tour de '+players[curPlayer].name+' · touche une carte');
    $('prompt').style.display='';
  }

  function renderQ(el,text){
    /* resserrement : pas d'espace (insécable comprise) avant ? ! : ; » ni après « */
    text=text.replace(/\s+([?!:;»])/g,'$1').replace(/«\s+/g,'«');
    el.querySelector('.fq').textContent=text;   /* instantané, sans cascade */
  }
  function lcFirst(s){ const m=s.match(/^(\s*[«"'(]?)([A-Za-zÀ-ÿ])([\s\S]*)$/); return m ? m[1]+m[2].toLowerCase()+m[3] : s; }
  /* ===== Blind test : audio + révélation ===== */
  const _audio=document.getElementById('player');
  let _aEl=null,_aRaf=null,_jn=0;
  function stopAudio(){ try{_audio.pause();}catch(e){} if(_aRaf)cancelAnimationFrame(_aRaf); _aRaf=null; _aEl=null; }
  function lookup(id){ return new Promise((res,rej)=>{ const cb='__it'+(++_jn); const s=document.createElement('script');
    const done=()=>{ try{delete window[cb];}catch(e){} s.remove(); };
    window[cb]=dt=>{ const r=dt&&dt.results&&dt.results[0]; done(); r?res(r):rej(); };
    s.onerror=()=>{ done(); rej(); };
    s.src='https://itunes.apple.com/lookup?id='+id+'&country=CA&callback='+cb;
    document.head.appendChild(s); setTimeout(()=>{ if(window[cb]){ done(); rej(); } },9000); }); }
  function _prog(el){ const bar=el.querySelector('.sbar i'); if(!bar) return; const d=_audio.duration||30;
    bar.style.width=Math.min(100,_audio.currentTime/d*100).toFixed(1)+'%';
    if(_audio.paused||_audio.ended){ const b=el.querySelector('.play'); if(b)b.textContent=_audio.ended?'↺':'▶'; return; }
    _aRaf=requestAnimationFrame(()=>_prog(el)); }
  function playSong(el){ const b=el.querySelector('.play'), h=el.querySelector('.shint');
    if(!el._preview){ if(h)h.textContent='Chargement…'; return; }
    if(_aEl===el && !_audio.paused){ _audio.pause(); if(b)b.textContent='▶'; if(_aRaf)cancelAnimationFrame(_aRaf); return; }
    if(_aEl!==el){ _audio.src=el._preview; _aEl=el; }
    _audio.play().then(()=>{ if(b)b.textContent='⏸'; _prog(el); }).catch(()=>{ if(h)h.textContent='Lecture bloquée — retouche.'; }); }
  function revealAnswer(){ if(!curEl||!curEl._song) return; const s=curEl._song, body=curEl.querySelector('.fbody');
    curEl.querySelector('.fname').textContent='Réponse';
    const art=curEl._art?'<img class="sart" src="'+curEl._art+'" alt="">':'';
    body.innerHTML=art+'<div class="sans"><div class="sa">'+esc(s.a)+'</div><div class="st">'+esc(s.t)+'</div><div class="sy">'+esc(s.y)+'</div></div>'; }
  function fill(el,person,q,partner){
    stopAudio();
    el.querySelector('.fhead').style.background=el.dataset.bg;
    const LV={1:'Niveau 1 · Les tubes',2:'Niveau 2 · Faut suivre',3:'Niveau 3 · Les pointus'};
    el.querySelector('.fserie').textContent=LV[q.serie]||('Niveau '+q.serie);
    el.querySelector('.fname').textContent='Chanson mystère';
    el.querySelector('.ffoot').textContent=q.n+' / '+N;
    const song=SETS[q.serie][q.idx]; el._song=song; el._preview=null; el._art=null;
    const tw=el.querySelector('.ftimer'); if(tw) tw.style.display='none';
    const body=el.querySelector('.fbody');
    body.innerHTML='<button class="play" type="button">▶</button><div class="sbar"><i></i></div><div class="shint">Touche pour écouter (30 s)</div>';
    const pb=body.querySelector('.play');
    pb.addEventListener('pointerdown',e=>e.stopPropagation());
    pb.addEventListener('click',e=>{ e.stopPropagation(); playSong(el); });
    lookup(song.id).then(r=>{ el._preview=r.previewUrl; el._art=(r.artworkUrl100||'').replace('100x100','400x400'); })
      .catch(()=>{ const h=el.querySelector('.shint'); if(h)h.textContent='Extrait indisponible.'; });
  }

  /* ---------- timer intégré (questions chronométrées) ---------- */
  const NUMW={'un':1,'une':1,'deux':2,'trois':3,'quatre':4,'cinq':5,'six':6,'sept':7,'huit':8,'neuf':9,'dix':10,'douze':12,'quinze':15,'vingt':20,'trente':30,'quarante':40,'cinquante':50,'soixante':60};
  function detectDuration(text){
    const t=text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const m=t.match(/(\d{1,3}|une?|deux|trois|quatre|cinq|six|sept|huit|neuf|dix|douze|quinze|vingt|trente|quarante|cinquante|soixante)\s*(minute|seconde)/);
    if(!m) return 0;
    let n = NUMW[m[1]]!==undefined ? NUMW[m[1]] : parseInt(m[1],10);
    if(!n||isNaN(n)) return 0;
    return m[2]==='minute' ? n*60 : n;
  }
  const ICO_PLAY='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const ICO_PAUSE='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
  const ICO_RESET='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 0 2.4-5.7"/><path d="M4 4v4h4"/></svg>';
  let tmr=null, tRemain=0, tTotal=0;
  const fmtT=s=>Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
  function clearTimer(){ if(tmr){clearInterval(tmr);tmr=null;} }
  function renderTimer(el,running){
    const wrap=el&&el.querySelector('.ftimer'); if(!wrap) return;
    wrap.querySelector('.ttime').textContent=fmtT(tRemain);
    wrap.querySelector('.tbar i').style.width=(tTotal?100*(1-tRemain/tTotal):0).toFixed(1)+'%';
    const done=tRemain<=0;
    wrap.classList.toggle('run',running&&!done);
    wrap.classList.toggle('done',done);
    wrap.querySelector('.tbtn').innerHTML = done?ICO_RESET : (running?ICO_PAUSE:ICO_PLAY);
  }
  function setupTimer(el,secs){
    clearTimer();
    const wrap=el&&el.querySelector('.ftimer'); if(!wrap) return;
    if(!secs){ wrap.style.display='none'; return; }
    wrap.style.display='flex';
    tTotal=secs; tRemain=secs; renderTimer(el,false);
  }
  function toggleTimer(){
    if(!curEl) return; const el=curEl;
    if(tRemain<=0){ tRemain=tTotal; renderTimer(el,false); return; }   /* reset */
    if(tmr){ clearTimer(); renderTimer(el,false); return; }            /* pause */
    tmr=setInterval(()=>{
      tRemain--;
      if(tRemain<=0){ tRemain=0; clearTimer(); renderTimer(el,false); if(navigator.vibrate)navigator.vibrate([120,60,120]); }
      else renderTimer(el,true);
    },1000);
    renderTimer(el,true);
  }

  /* slide a card back into the farandole, at its own depth (or hide if beyond the pile) */
  function sendBack(el){
    clearTimer();
    el.classList.remove('out','flipped');
    const f=fanList(), k=f.indexOf(el);
    if(k>=0){ const p=poseOf(k); el.style.transform=p.t; el.style.zIndex=p.z; el.style.opacity=''; el.style.pointerEvents=''; }
    else { el.style.opacity='0'; el.style.pointerEvents='none'; el.style.transform='translate(-50%,-50%) translateY(20px) scale(.6)'; }
  }

  /* the touched card leaves the wave toward the viewer and flips */
  function pullOut(el){
    if(animating || !el) return; animating=true;
    const person=players[curPlayer];
    const qid=el._qid;                              /* question figée de CETTE carte */
    const hasMoitie=(person.mate && players.length>1);
    if(el._chosenIdx==null){ el._chosenIdx=pickQuestion(ALL[qid].serie, hasMoitie); }
    const q={serie:ALL[qid].serie, idx:el._chosenIdx, n:ALL[qid].n};
    const raw=SETS[q.serie][q.idx];
    let partner = (IX.test(raw) && hasMoitie) ? person.mate : null;  /* couple: la moitié, par reference */
    const reveal=()=>{
      fill(el,person,q,partner);
      el.classList.add('out','flipped');
      el.style.zIndex=999;
      const tilt=(Math.random()*8-4).toFixed(2);   /* léger angle imparfait, plus naturel */
      el.style.transform='translate(-50%,-50%) translateY(-8px) translateZ(78px) scale(1.04) rotate('+tilt+'deg)';
      deck.classList.add('frozen','presenting');
      curEl=el; curQid=qid;
      $('prompt').style.display='none';
      $('actions').classList.add('show');
      setTimeout(()=>{animating=false;},700);
    };
    if(curEl && curEl!==el){
      $('actions').classList.remove('show');
      sendBack(curEl); curEl=null;
      setTimeout(reveal,280);
    }else{ reveal(); }
  }

  /* the open card slides back into the deck — same player, pile just shrank by one */
  /* fermer la carte ouverte sans rien consommer (taper la carte ouverte) */
  function putBack(){
    if(!curEl) return;
    clearTimer(); stopAudio(); curQid=null;
    curEl.classList.remove('out','flipped'); curEl=null;
    deck.classList.remove('frozen','presenting');
    $('actions').classList.remove('show');
    cancelInertia();                      /* on reste là où on est : pas de recentrage */
    showPrompt();
    applyVis();
    animating=true; setTimeout(()=>animating=false,420);
  }

  /* « Une autre! » : même joueur, la carte actuelle est PRÉSERVÉE (reste dans le deck),
     on en ouvre une autre automatiquement. */
  function anotherCard(){
    if(animating || !curEl) return;
    animating=true; clearTimer();
    const done=curEl;
    done.classList.remove('out','flipped'); curEl=null; curQid=null;
    deck.classList.remove('frozen','presenting');
    $('actions').classList.remove('show');
    cancelInertia();
    applyVis();                                   /* deck inchangé : la carte est conservée */
    setTimeout(()=>{
      animating=false;
      let pool=fanList().filter(c=>c!==done);     /* une carte différente */
      if(pool.length===0) pool=fanList();
      if(pool.length) pullOut(pool[rand(pool.length)]);
      else showPrompt();
    },200);
  }

  /* « Suivant! » : la carte actuelle est SUPPRIMÉE du deck, c'est au joueur suivant,
     qui devra toucher lui-même une carte pour la choisir. */
  function nextPlayer(){
    if(animating || !curEl) return;
    animating=true; clearTimer();
    const done=curEl;
    stopAudio(); done._dead=true;                  /* la carte jouée quitte le deck */
    if(players.length>1) curPlayer=(curPlayer+1)%players.length;
    done.classList.remove('out','flipped'); curEl=null; curQid=null;
    deck.classList.remove('frozen','presenting');
    $('actions').classList.remove('show');
    cancelInertia();
    applyVis(); setBacks(); showPrompt();         /* le suivant touche une carte */
    setTimeout(()=>{ animating=false; },420);
  }

  /* Mélanger : les cartes se rassemblent au centre, on rebrasse l'ORDRE (chaque carte garde
     son motif et sa question), puis elles se redéploient. Aucun repeint, rien de neuf. */
  function shuffleByCenter(){
    animating=true; cancelInertia(); pan=0;
    clearTimer(); curQid=null;
    if(curEl){ curEl.classList.remove('out','flipped'); curEl=null; }
    deck.classList.remove('frozen','presenting');
    deck.classList.add('piling','shuffling');
    $('actions').classList.remove('show');
    const C='translate(-50%,-50%) ';
    const rnd=(a,b)=>a+Math.random()*(b-a);
    const live=fanList();
    const n=live.length, mid=Math.ceil(n/2);
    cards.forEach(el=>{ if(el._dead) el.style.opacity='0'; });

    /* 1 — saisie : les cartes bondissent au centre, agrandies et en relief (premier plan) */
    live.forEach((el,k)=>{
      el.style.transition='transform .2s cubic-bezier(.4,1.5,.5,1)';
      el.style.transform=C+'translate('+rnd(-4,4).toFixed(1)+'px,'+(k*0.25-4).toFixed(1)+'px) rotate('+rnd(-4,4).toFixed(1)+'deg) scale(1.07)';
      el.style.zIndex=500+k;
    });

    /* 2 — coupe large et inclinée : deux paquets s'ouvrent en grand */
    setTimeout(()=>{
      live.forEach((el,k)=>{
        const left=k<mid, idx=left?k:(k-mid);
        const dx=left?rnd(-118,-92):rnd(92,118);
        const rot=left?rnd(-19,-11):rnd(11,19);
        const dy=rnd(-30,-8)+idx*1.1;
        el.style.transition='transform .26s cubic-bezier(.25,.9,.3,1)';
        el.style.transform=C+'translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px) rotate('+rot.toFixed(1)+'deg) scale(1.07)';
        el.style.zIndex=500+k;
      });
    }, 220);

    /* 3 — riffle : les deux paquets claquent ensemble au centre, en alternance */
    const T3=500;
    const st=Math.min(6, 240/Math.max(n,1));
    setTimeout(()=>{
      const L=live.slice(0,mid), R=live.slice(mid);
      const order=[]; let a=0,b=0;
      while(a<L.length||b<R.length){ if(a<L.length) order.push(L[a++]); if(b<R.length) order.push(R[b++]); }
      order.forEach((el,m)=>{
        el.style.transition='transform .26s cubic-bezier(.45,.9,.3,1) '+(m*st/1000).toFixed(3)+'s';
        el.style.transform=C+'translate('+rnd(-3,3).toFixed(1)+'px,'+(m*0.28-4).toFixed(1)+'px) rotate('+rnd(-3,3).toFixed(1)+'deg) scale(1.05)';
        el.style.zIndex=500+m;
      });
    }, T3);

    /* 4 — rebrassage caché (cartes empilées) puis déploiement rapide en farandole */
    const riffleTotal=260+(n-1)*st;
    setTimeout(()=>{
      for(let i=cards.length-1;i>0;i--){ const j=rand(i+1); [cards[i],cards[j]]=[cards[j],cards[i]]; }
      computeVis(); setBacks();
      const f=fanList();
      const d=Math.min(0.02, 0.5/Math.max(vis,1)), c=(vis-1)/2; let maxDelay=0;
      f.forEach((el,k)=>{
        const delay=(c-Math.abs(k-c))*d; if(delay>maxDelay) maxDelay=delay;
        el.style.transition='transform .42s cubic-bezier(.2,.85,.25,1) '+delay.toFixed(3)+'s, opacity .28s ease '+delay.toFixed(3)+'s';
        const p=poseOf(k); el.style.transform=p.t; el.style.zIndex=p.z; el.style.opacity=''; el.style.pointerEvents='';
      });
      cards.forEach(el=>{ if(el._dead){ el.style.transition='opacity .25s ease'; el.style.opacity='0'; el.style.pointerEvents='none'; } });
      showPrompt();
      setTimeout(()=>{ cards.forEach(el=>{el.style.transition='';}); deck.classList.remove('piling','shuffling'); animating=false; }, 440+maxDelay*1000);
    }, T3+riffleTotal+50);
  }

  $('reveal').onclick=()=>{ if(!animating) revealAnswer(); };
  $('next').onclick=()=>{ if(animating) return; nextPlayer(); };        /* Suivant! : carte supprimée, au joueur suivant (il touche) */

  /* ---------- finite left/right drag, with a soft bounce at the ends ---------- */
  const area=document.querySelector('.deck-area');
  let dragging=false, moved=false, downCard=null, dragStartX=0, panStart=0, lastX=0, lastT=0, vx=0, raf=null;
  const VWpx=()=>window.innerWidth/100;
  function setDragMode(on){ cards.forEach(el=>{ if(el!==curEl) el.style.transition=on?'none':''; }); }
  function cancelInertia(){ if(raf){cancelAnimationFrame(raf);raf=null;} }
  function bound(){ return (vis-1)/2*spacingFor(vis); }     /* |pan| limit */
  function fanSpan(){ return (vis-1)*spacingFor(vis); }     /* total fan width in vw */
  /* glide with inertia inside the bounds, then spring back if it overshoots an end */
  function animatePan(){
    cancelInertia();
    (function tick(){
      const h=bound();
      if(pan>h+0.02 || pan<-h-0.02){              /* past an edge → spring back (bounce) */
        const t = pan>0 ? h : -h;
        vx = vx*0.55 + (t-pan)*0.16;
        pan += vx;
        layout();
        if(Math.abs(pan-t)<0.25 && Math.abs(vx)<0.25){ pan=t; layout(); raf=null; setDragMode(false); return; }
        raf=requestAnimationFrame(tick);
      } else {                                     /* free glide, gently decaying */
        if(Math.abs(vx)<0.03){ raf=null; setDragMode(false); return; }
        pan += vx; vx*=0.92; layout(); raf=requestAnimationFrame(tick);
      }
    })();
  }
  area.addEventListener('pointerdown',e=>{
    if(animating) return;
    downCard=e.target.closest('.card'); moved=false;
    if(!curEl && fanSpan()>96){                            /* drag only when the fan overflows the screen */
      dragging=true; dragStartX=e.clientX; panStart=pan; lastX=e.clientX; lastT=performance.now(); vx=0;
      cancelInertia(); setDragMode(true);
      try{area.setPointerCapture(e.pointerId);}catch(_){}
    }
  });
  area.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dx=e.clientX-dragStartX;
    if(Math.abs(dx)>6) moved=true;
    let target=panStart+dx/VWpx();
    const h=bound();                                        /* rubber-band: resist past the ends */
    if(target>h) target=h+(target-h)*0.35;
    else if(target<-h) target=-h+(target+h)*0.35;
    pan=target;
    const now=performance.now(), dt=now-lastT;
    if(dt>0) vx=((e.clientX-lastX)/VWpx())/dt*16;
    lastX=e.clientX; lastT=now;
    layout();
  });
  function endDrag(){
    const wasDrag=dragging; dragging=false;
    if(wasDrag){ if(moved) animatePan(); else setDragMode(false); }
    if(!moved && downCard && !animating){
      if(downCard===curEl) putBack();
      else pullOut(downCard);
    }
    downCard=null;
  }
  area.addEventListener('pointerup',endDrag);
  area.addEventListener('pointercancel',endDrag);

  /* ---------- bottom icon buttons ---------- */
  $('shuffle').onclick=()=>{ if(!animating) shuffleByCenter(); };
  $('editPlayers').onclick=()=>{
    const list=players.map(p=>({name:p.name,g:p.fem?'f':'m'}));
    while(list.length<2) list.push({name:'',g:list.length%2?'m':'f'});
    buildRows(list);
    $('hint').classList.remove('show');
    $('game').classList.remove('active'); $('setup').classList.add('active');
  };
</script>
<audio id="player" preload="none" playsinline></audio>
</body>
</html>
