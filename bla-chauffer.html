<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bla — Chauffer : 4 pistes playful</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Archivo,sans-serif;color:#fff;background:#13070a;padding:26px 16px 70px}
h1{font-family:"Bricolage Grotesque";font-weight:800;font-size:25px;letter-spacing:-.02em;margin-bottom:4px}
.sub{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:10px;max-width:62ch;line-height:1.5}
h2{font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;margin:26px 0 3px}.desc{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:12px}
.grid{display:flex;flex-wrap:wrap;gap:14px}.item{width:128px}
.card{width:128px;aspect-ratio:5/7;border-radius:13px;background:#fff;padding:6px;box-shadow:0 12px 28px rgba(0,0,0,.5)}
.art{width:100%;height:100%;border-radius:8px;overflow:hidden}
@media(max-width:520px){.item,.card{width:43vw}}</style></head><body>
<h1>🥵 Chauffer — 4 pistes playful</h1><p class="sub">Même esprit que Connaître (trames) et Séduire (peaux) : des textures génératives, pas un dos sérieux. Dis-moi laquelle tu veux comme identité du mode (ou un mélange).</p>
<div id="root"></div>
<script>
function oRng(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function svURL(W,H,body){var s="<svg xmlns='http://www.w3.org/2000/svg' width='"+W+"' height='"+H+"' viewBox='0 0 "+W+" "+H+"'>"+body+"</svg>";return "url(\"data:image/svg+xml,"+encodeURIComponent(s)+"\") center/cover no-repeat";}
var F1=n=>Number(n).toFixed(1);
function rectF(W,H,F){return "<rect width='"+W+"' height='"+H+"' fill='"+F+"'/>";}

/* ===================== SÉDUIRE — peaux d'animaux (SVG net, franc) ===================== */
function aZebra(W,H,F,K,rng){let b=rectF(W,H,F),x=-10;while(x<W+10){const w=11+rng()*20,amp=4+rng()*9,k=(1.3+rng()*1.9)*Math.PI/H,ph=rng()*6.28,sk=(rng()-0.5)*0.55,N=20;let d="";for(let i=0;i<=N;i++){const y=i/N*H,xe=x+Math.sin(y*k+ph)*amp+y*sk;d+=(i?"L":"M")+F1(xe)+" "+F1(y);}for(let i=N;i>=0;i--){const y=i/N*H,wob=1+0.5*Math.sin(y*k*1.7+ph),xe=x+w*wob*0.6+Math.sin(y*k+ph+0.8)*amp+y*sk;d+="L"+F1(xe)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='"+K+"'/>";x+=w*0.6+9+rng()*16;}return b;}
function aTiger(W,H,F,K,rng){let b=rectF(W,H,F),x=-8;while(x<W+8){const w0=6+rng()*9,amp=3+rng()*6,k=(2+rng()*2.4)*Math.PI/H,ph=rng()*6.28,dir=rng()<0.5?1:-1,N=20;let d="";for(let i=0;i<=N;i++){const y=i/N*H,xe=x+Math.sin(y*k+ph)*amp;d+=(i?"L":"M")+F1(xe)+" "+F1(y);}for(let i=N;i>=0;i--){const y=i/N*H,t=dir>0?i/N:1-i/N,w=w0*(0.12+0.95*t),xe=x+w+Math.sin(y*k+ph)*amp;d+="L"+F1(xe)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='"+K+"'/>";x+=w0*0.6+8+rng()*12;}return b;}
function _patch(q,ins,Col,sw){const cx=(q[0][0]+q[1][0]+q[2][0]+q[3][0])/4,cy=(q[0][1]+q[1][1]+q[2][1]+q[3][1])/4;const p=q.map(v=>[v[0]+(cx-v[0])*ins,v[1]+(cy-v[1])*ins]);let d="M"+F1(p[0][0])+" "+F1(p[0][1]);for(let i=1;i<4;i++)d+="L"+F1(p[i][0])+" "+F1(p[i][1]);d+="Z";return "<path d='"+d+"' fill='"+Col+"' stroke='"+Col+"' stroke-width='"+sw+"' stroke-linejoin='round'/>";}
function aGiraffe(W,H,F,K,rng){const C=3,Rw=5,P=[];for(let r=0;r<=Rw;r++){P[r]=[];for(let c=0;c<=C;c++)P[r][c]=[c*W/C+(rng()-0.5)*(W/C)*0.5,r*H/Rw+(rng()-0.5)*(H/Rw)*0.5];}let b=rectF(W,H,F);for(let r=0;r<Rw;r++)for(let c=0;c<C;c++)b+=_patch([P[r][c],P[r][c+1],P[r+1][c+1],P[r+1][c]],0.16,K,6);return b;}
function aCroc(W,H,F,K,rng){const C=5,Rw=8,P=[];for(let r=0;r<=Rw;r++){P[r]=[];for(let c=0;c<=C;c++)P[r][c]=[c*W/C+(rng()-0.5)*(W/C)*0.55,r*H/Rw+(rng()-0.5)*(H/Rw)*0.55];}let b=rectF(W,H,F);for(let r=0;r<Rw;r++)for(let c=0;c<C;c++)b+=_patch([P[r][c],P[r][c+1],P[r+1][c+1],P[r+1][c]],0.2,K,3);return b;}
function aLeopard(W,H,F,K,rng){let b=rectF(W,H,F);const sx=W/4,sy=H/5.4;for(let gy=-1;gy<6;gy++)for(let gx=-1;gx<5;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.7,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.7,rr=7+rng()*5,seg=4+Math.floor(rng()*3),rot=rng()*6.28;let g="<g fill='none' stroke='"+K+"' stroke-width='3.2' stroke-linecap='round'>";for(let s=0;s<seg;s++){const a0=rot+s/seg*6.28+0.3,a1=a0+6.28/seg-0.85,x0=cx+Math.cos(a0)*rr,y0=cy+Math.sin(a0)*rr,x1=cx+Math.cos(a1)*rr,y1=cy+Math.sin(a1)*rr;g+="<path d='M"+F1(x0)+" "+F1(y0)+" A "+F1(rr)+" "+F1(rr)+" 0 0 1 "+F1(x1)+" "+F1(y1)+"'/>";}g+="</g>";b+=g;}return b;}
function aCow(W,H,F,K,rng){let b=rectF(W,H,F);const n=4+Math.floor(rng()*2);for(let i=0;i<n;i++){const cx=rng()*W,cy=rng()*H,base=26+rng()*34,M=20;let d="";for(let j=0;j<=M;j++){const a=j/M*6.283,rr=base*(0.62+0.5*Math.sin(a*2+i*1.3)+0.32*(rng()-0.5));const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*1.1;d+=(j?"L":"M")+F1(x)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='"+K+"'/>";}return b;}
function aSnake(W,H,F,K,rng){let b=rectF(W,H,F);const cw=18,ch=13;let ry=0;for(let y=-ch;y<H+ch;y+=ch){const off=(ry%2)*(cw/2);for(let x=-cw;x<W+cw;x+=cw){const X=x+off;b+="<path d='M"+F1(X)+" "+F1(y-ch*0.6)+" L"+F1(X+cw*0.5)+" "+F1(y)+" L"+F1(X)+" "+F1(y+ch*0.6)+" L"+F1(X-cw*0.5)+" "+F1(y)+" Z' fill='none' stroke='"+K+"' stroke-width='1.6'/>";}ry++;}return b;}
function aDots(W,H,F,K,rng){let b=rectF(W,H,F);const n=60;for(let i=0;i<n;i++){const cx=rng()*W,cy=rng()*H,base=2.5+rng()*5,M=10;let d="";for(let j=0;j<=M;j++){const a=j/M*6.283,rr=base*(0.7+0.5*(rng()-0.5));const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;d+=(j?"L":"M")+F1(x)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='"+K+"'/>";}return b;}
function skinMotif(seed){const forms=[aZebra,aTiger,aGiraffe,aLeopard,aCow,aSnake,aDots,aCroc];const ways=[['#2a0f24','#ff7aa2'],['#33122c','#c084fc'],['#1f0a1c','#ff9ebb'],['#2a0f24','#e9b3ff']];const r=oRng(seed*5+2);const f=forms[Math.floor(r()*forms.length)];const w=ways[Math.floor(r()*ways.length)];return svURL(200,280,f(200,280,w[0],w[1],r));}

/* ===================== CHAUFFER — 4 pistes playful (génératif) ===================== */
function cFlames(W,H,F,A,B,rng){let b=rectF(W,H,F);const C=5,Rw=7;for(let gy=0;gy<Rw;gy++)for(let gx=-1;gx<=C;gx++){const sc=0.5+gy/Rw*0.9,cx=gx*W/C+W/C*0.5+(rng()-0.5)*W/C*0.6,cy=gy*H/Rw+H/Rw*0.7+(rng()-0.5)*12,h=(16+rng()*15)*sc,w=h*0.42,tip=cx+(rng()-0.5)*w*0.9,col=rng()<0.5?A:B;b+="<path d='M"+F1(cx)+" "+F1(cy)+" C "+F1(cx-w)+" "+F1(cy-h*0.45)+" "+F1(tip-w*0.25)+" "+F1(cy-h*0.82)+" "+F1(tip)+" "+F1(cy-h)+" C "+F1(tip+w*0.25)+" "+F1(cy-h*0.82)+" "+F1(cx+w)+" "+F1(cy-h*0.45)+" "+F1(cx)+" "+F1(cy)+" Z' fill='"+col+"'/>";if(rng()<0.55){const h2=h*0.55,w2=w*0.5;b+="<path d='M"+F1(cx)+" "+F1(cy)+" C "+F1(cx-w2)+" "+F1(cy-h2*0.45)+" "+F1(cx-w2*0.25)+" "+F1(cy-h2*0.82)+" "+F1(cx)+" "+F1(cy-h2)+" C "+F1(cx+w2*0.25)+" "+F1(cy-h2*0.82)+" "+F1(cx+w2)+" "+F1(cy-h2*0.45)+" "+F1(cx)+" "+F1(cy)+" Z' fill='"+(col===A?B:A)+"'/>";}}return b;}
function cWaves(W,H,F,A,B,rng){let b=rectF(W,H,F);const step=15+rng()*8,amp=7+rng()*7,f=(1.4+rng()*1.6)*Math.PI/W,ph=rng()*6.28,cols=[A,B];let idx=0;for(let base=-step;base<H+step*2;base+=step){const N=24;let d="M-4 "+F1(base);for(let i=0;i<=N;i++){const x=i/N*W,y=base+Math.sin(x*f+ph+base*0.05)*amp;d+="L"+F1(x)+" "+F1(y);}d+="L"+(W+4)+" "+F1(base+step+2);for(let i=N;i>=0;i--){const x=i/N*W,y=base+step+Math.sin(x*f+ph+(base+step)*0.05)*amp;d+="L"+F1(x)+" "+F1(y);}d+="Z";b+="<path d='"+d+"' fill='"+cols[idx%2]+"'/>";idx++;}return b;}
function cKiss(W,H,F,A,B,rng){let b=rectF(W,H,F);const sx=W/3.4,sy=H/4.6;for(let gy=-1;gy<5;gy++)for(let gx=-1;gx<4;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.6,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.6,s=7+rng()*7,rot=(rng()-0.5)*44,col=rng()<0.5?A:B;const d="M "+F1(-s)+" 0 C "+F1(-s*0.7)+" "+F1(-s*0.55)+" "+F1(-s*0.4)+" "+F1(-s*0.55)+" 0 "+F1(-s*0.16)+" C "+F1(s*0.4)+" "+F1(-s*0.55)+" "+F1(s*0.7)+" "+F1(-s*0.55)+" "+F1(s)+" 0 C "+F1(s*0.5)+" "+F1(s*0.62)+" "+F1(-s*0.5)+" "+F1(s*0.62)+" "+F1(-s)+" 0 Z";b+="<g transform='translate("+F1(cx)+" "+F1(cy)+") rotate("+F1(rot)+")'><path d='"+d+"' fill='"+col+"'/><path d='M "+F1(-s)+" 0 L "+F1(s)+" 0' stroke='"+F+"' stroke-width='1.1'/></g>";}return b;}
function cSparks(W,H,F,A,B,rng){let b=rectF(W,H,F);const sx=W/4,sy=H/5.2;for(let gy=-1;gy<6;gy++)for(let gx=-1;gx<5;gx++){const cx=gx*sx+sx*0.5+(rng()-0.5)*sx*0.7,cy=gy*sy+sy*0.5+(rng()-0.5)*sy*0.7,rr=4+rng()*7,N=rng()<0.5?4:6,rot=rng()*6.28,col=rng()<0.5?A:B;let g="<g stroke='"+col+"' stroke-width='1.6' stroke-linecap='round'>";for(let s=0;s<N;s++){const a=rot+s/N*6.2832;g+="<line x1='"+F1(cx-Math.cos(a)*rr)+"' y1='"+F1(cy-Math.sin(a)*rr)+"' x2='"+F1(cx+Math.cos(a)*rr)+"' y2='"+F1(cy+Math.sin(a)*rr)+"'/>";}g+="</g><circle cx='"+F1(cx)+"' cy='"+F1(cy)+"' r='1.7' fill='"+col+"'/>";b+=g;}return b;}
var CWAYS=[['#3a0c1c','#ff5c3c','#ffb14e'],['#2a0712','#ff2e63','#ff8a5c'],['#36060f','#ff4d3d','#ffd24a'],['#3a0c1c','#ff2e63','#ff6b3c']];
function _cm(fn){return function(seed){const r=oRng(seed*3+1),w=CWAYS[Math.floor(r()*CWAYS.length)];return svURL(200,280,fn(200,280,w[0],w[1],w[2],r));};}
var flamesMotif=_cm(cFlames), wavesMotif=_cm(cWaves), kissMotif=_cm(cKiss), sparksMotif=_cm(cSparks);
function chaufferMotif(seed){return flamesMotif(seed);}   /* défaut jeu = Flammes (modifiable) */

const PISTES=[["Flammes","Des langues de feu génératives qui montent — littéralement « chauffer ».",flamesMotif],
["Ondes chaudes","Vagues de chaleur pleines, en bandes — cousin curvy des trames de Connaître.",wavesMotif],
["Bisous","Marques de baisers dispersées — flirt assumé, façon semis de pois.",kissMotif],
["Étincelles","Petites gerbes d'étincelles — festif, pétillant, qui crépite.",sparksMotif]];
const root=document.getElementById('root');
PISTES.forEach((p,pi)=>{const sec=document.createElement('div');sec.innerHTML="<h2>"+p[0]+"</h2><div class='desc'>"+p[1]+"</div>";const g=document.createElement('div');g.className='grid';sec.appendChild(g);root.appendChild(sec);for(let i=0;i<4;i++){const it=document.createElement('div');it.className='item';it.innerHTML="<div class='card'><div class='art'></div></div>";g.appendChild(it);it.querySelector('.art').style.background=p[2](pi*1000+i*137+11);}});
</script></body></html>
